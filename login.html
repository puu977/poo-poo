<script>
(async ()=>{
  if(await checkAlreadyLoggedIn()){
    window.location.href = "home.html";
    return;
  }

  const pw = document.getElementById('password');

  document.getElementById('togglePw').onclick = ()=>{
    const t = pw.type === 'password';
    pw.type = t ? 'text' : 'password';
    document.getElementById('togglePw').textContent = t ? 'Sembunyi' : 'Lihat';
  };

  document.getElementById('loginForm').addEventListener('submit', async e=>{
    e.preventDefault();

    const btn = document.getElementById('loginBtn');
    const email = document.getElementById('email').value.trim();
    const password = pw.value;

    if(!sb){
      showToast('Supabase belum dikonfigurasi');
      return;
    }

    setLoading(btn, true, 'Masuk…');

    const { data, error } = await sb.auth.signInWithPassword({
      email, password
    });

    setLoading(btn, false);

    if(error){
      showToast(authError(error));
      return;
    }

    saveLocalUser(data.user);

    showToast('Berhasil masuk');
    setTimeout(()=> window.location.href = "home.html", 400);
  });
})();
</script>
