<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk – Puu Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">

<style>
/* CSS TIDAK DIUBAH SAMA SEKALI */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#DDD9D0}
.auth-card{width:100%;max-width:420px;background:#49426E;border:5px solid #E2D3F4;border-radius:25px;box-shadow:0 0 25px #9e8faf92;padding:32px 28px;color:#E2D3F4}
.auth-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:18px;font-weight:700;font-size:22px;color:#E2D3F4}
.auth-logo span{color:#EEC291}
.auth-title{text-align:center;font-size:24px;font-weight:700;margin-bottom:4px}
.auth-sub{text-align:center;font-size:13.5px;color:#c3b8d8;margin-bottom:22px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:12.5px;color:#c3b8d8;margin-bottom:6px}
.fld input{width:100%;background:#E2D3F4;border:none;border-radius:8px;padding:11px 14px;font-size:15px;color:#332F54;outline:none;font-family:"Poppins",sans-serif}
.fld input::placeholder{color:#7a6a8a}
.btn-primary{width:100%;background:#EEC291;color:#332F54;border:none;border-radius:12px;padding:12px;font-weight:700;font-size:15px;cursor:pointer;margin-top:6px}
.btn-primary:disabled{opacity:.6}
.auth-foot{text-align:center;font-size:13.5px;color:#c3b8d8;margin-top:16px}
.auth-foot a{color:#EEC291;font-weight:600;text-decoration:none}
.auth-link-right{text-align:right;font-size:12.5px;margin-top:-6px;margin-bottom:10px}
.auth-link-right a{color:#b99ecf;text-decoration:none}
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#5a4a6e;font-size:12.5px;cursor:pointer;font-family:"Poppins",sans-serif}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(18px);background:#211935;color:#efdccd;padding:11px 16px;border-radius:999px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:.22s;z-index:99;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Puu <span>Chat</span></div>
    <div class="auth-title">Masuk</div>
    <div class="auth-sub">Selamat datang kembali</div>

    <form id="loginForm">
      <div class="fld">
        <label>Email</label>
        <input type="email" id="email" placeholder="kamu@email.com" required autocomplete="email">
      </div>

      <div class="fld">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" style="padding-right:56px">
          <button type="button" class="pw-toggle" id="togglePw">Lihat</button>
        </div>
      </div>

      <div class="auth-link-right">
        <a href="forgot-password.html">Lupa password?</a>
      </div>

      <button class="btn-primary" id="loginBtn" type="submit">Masuk</button>
    </form>

    <div class="auth-foot">
      Belum punya akun? <a href="register.html">Daftar</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ================= SAFE INIT ================= */
const SUPABASE_URL = "https://YOUR-PROJECT.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_ANON_KEY";

const sb = (window.supabase && SUPABASE_URL.includes('http'))
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

/* ================= TOAST ================= */
function showToast(msg){
  const t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>t.classList.remove('show'), 2400);
}

/* ================= SESSION CHECK ================= */
(async ()=>{
  try{
    if(!sb) return;
    const { data } = await sb.auth.getSession();
    if(data?.session){
      location.replace('home.html');
    }
  }catch(e){}
})();

/* ================= PASSWORD TOGGLE ================= */
document.getElementById('togglePw').onclick = ()=>{
  const p = document.getElementById('password');
  const is = p.type === 'password';
  p.type = is ? 'text' : 'password';
  document.getElementById('togglePw').textContent = is ? 'Sembunyi' : 'Lihat';
};

/* ================= LOGIN ================= */
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();

  const btn = document.getElementById('loginBtn');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if(!sb){
    showToast('Supabase belum dikonfigurasi');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Masuk…';

  const { error } = await sb.auth.signInWithPassword({
    email, password
  });

  btn.disabled = false;
  btn.textContent = 'Masuk';

  if(error){
    const msg = error.message.toLowerCase().includes('invalid')
      ? 'Email atau password salah'
      : error.message;

    showToast(msg);
    return;
  }

  showToast('Berhasil masuk');
  setTimeout(()=>location.href='home.html', 400);
});
</script>
</body>
</html>
