<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengaturan Channel – Puu Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
body{background:#49426E;color:#E2D3F4;font-family:'Poppins',sans-serif}
.wrap{max-width:640px;margin:0 auto;padding:16px}
.card{background:#332F54;border-radius:16px;padding:16px;margin-bottom:14px}
.card h3{margin:0 0 10px;color:#EEC291;font-size:15px}
input,textarea,select{width:100%;box-sizing:border-box;background:#49426E;border:1px solid #544F7E;border-radius:10px;padding:10px 12px;color:#E2D3F4;font-family:'Poppins',sans-serif;margin-bottom:8px}
label{font-size:12.5px;color:#b9a9d3}
.btn{background:#EEC291;color:#332F54;border:none;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer}
.btn-ghost{background:#49426E;color:#E2D3F4;border:1px solid #544F7E;border-radius:10px;padding:10px 16px;cursor:pointer}
.btn-danger{background:#5a2d2d;color:#ffb3b3;border:1px solid #7a3a3a;border-radius:10px;padding:10px 16px;cursor:pointer}
.row{display:flex;gap:8px;flex-wrap:wrap}
code{background:#49426E;padding:2px 6px;border-radius:6px;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
    <button class="btn-ghost" onclick="history.back()">← Kembali</button>
    <h2 style="margin:0">Pengaturan Channel</h2>
  </div>

  <div class="card">
    <h3>Overview Channel</h3>
    <label>Nama channel</label>
    <input id="cName" placeholder="nama-channel">
    <label>Topik</label>
    <textarea id="cTopic" placeholder="Topik channel…"></textarea>
    <label>Tipe</label>
    <select id="cType"><option value="text">Text</option><option value="voice">Voice</option><option value="announcement">Announcement</option></select>
  </div>

  <div class="card">
    <h3>Izin & Moderasi</h3>
    <label><input type="checkbox" id="nsfw"> Tandai sebagai NSFW</label>
    <label>Slowmode</label>
    <select id="slowmode"><option value="0">Off</option><option value="5">5 detik</option><option value="15">15 detik</option><option value="60">60 detik</option></select>
    <label style="margin-top:8px">Siapa bisa kirim pesan</label>
    <select id="perms"><option value="all">Semua anggota</option><option value="mod">Moderator ke atas</option><option value="admin">Admin saja</option></select>
  </div>

  <div class="card">
    <h3>Sematan</h3>
    <textarea id="pinned" placeholder="Teks yang disematkan di atas channel…"></textarea>
  </div>

  <div class="card">
    <h3>Integrasi – Webhook</h3>
    <div id="whList" style="color:#b9a9d3;font-size:13px;margin-bottom:8px">Belum ada webhook.</div>
    <button class="btn-ghost" id="addWhBtn">+ Buat Webhook</button>
    <div style="font-size:11.5px;color:#9b87b9;margin-top:6px">Gunakan URL webhook untuk kirim pesan bot ke channel ini.</div>
  </div>

  <div class="card">
    <h3>Terjemahan Otomatis 🔄</h3>
    <label><input type="checkbox" id="translateToggle"> Aktifkan auto-translate untuk channel ini</label>
  </div>

  <div class="card">
    <div class="row">
      <button class="btn-danger" id="deleteBtn">Hapus Channel</button>
      <button class="btn" id="saveBtn" style="margin-left:auto">Simpan Perubahan</button>
    </div>
  </div>
</div>

<div id="toast" style="position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#332F54;color:#E2D3F4;padding:8px 14px;border-radius:10px;display:none"></div>
<script>
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';clearTimeout(window._tt);window._tt=setTimeout(()=>t.style.display='none',1800)}
let ch = JSON.parse(localStorage.getItem('puu_edit_channel')||'null') || {name:'general', topic:'Obrolan umum', type:'text', nsfw:false, slowmode:'0', perms:'all', pinned:'', webhooks:[]};
document.getElementById('cName').value = ch.name || '';
document.getElementById('cTopic').value = ch.topic || '';
document.getElementById('cType').value = ch.type || 'text';
document.getElementById('nsfw').checked =!!ch.nsfw;
document.getElementById('slowmode').value = ch.slowmode || '0';
document.getElementById('perms').value = ch.perms || 'all';
document.getElementById('pinned').value = ch.pinned || '';
document.getElementById('translateToggle').checked = localStorage.getItem('puu_translate')==='1';

function renderWh(){
  const box=document.getElementById('whList');
  if(!ch.webhooks ||!ch.webhooks.length){ box.textContent='Belum ada webhook.'; return }
  box.innerHTML = ch.webhooks.map((w,i)=>`<code>${w}</code> <button onclick="navigator.clipboard.writeText('${w}');toast('Disalin')" style="background:#49426E;border:1px solid #544F7E;color:#E2D3F4;border-radius:6px;padding:2px 6px;font-size:11px;cursor:pointer">Copy</button>`).join('<br>');
}
renderWh();
document.getElementById('addWhBtn').onclick = ()=>{
  ch.webhooks = ch.webhooks || [];
  const url = 'https://puu.chat/api/webhooks/ch/' + Math.random().toString(36).slice(2,12);
  ch.webhooks.push(url); renderWh(); toast('Webhook dibuat');
};
document.getElementById('translateToggle').onchange = e=>{
  localStorage.setItem('puu_translate', e.target.checked?'1':'0');
  toast(e.target.checked?'Translate ON 🔄':'Translate OFF');
};
document.getElementById('saveBtn').onclick = ()=>{
  ch.name = document.getElementById('cName').value.trim().replace(/\s+/g,'-').toLowerCase() || ch.name;
  ch.topic = document.getElementById('cTopic').value.trim();
  ch.type = document.getElementById('cType').value;
  ch.nsfw = document.getElementById('nsfw').checked;
  ch.slowmode = document.getElementById('slowmode').value;
  ch.perms = document.getElementById('perms').value;
  ch.pinned = document.getElementById('pinned').value.trim();
  localStorage.setItem('puu_edit_channel', JSON.stringify(ch));
  toast('Channel disimpan'); setTimeout(()=> location.href='server.html', 600);
};
document.getElementById('deleteBtn').onclick = ()=>{
  if(confirm('Hapus channel #' + ch.name + '?')){
    toast('Channel dihapus'); setTimeout(()=> location.href='server.html', 500);
  }
};
</script>
</body>
</html>
