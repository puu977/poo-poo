<!DOCTYPE html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Post</title>
<style>body{margin:0;background:#332F54;color:#E2D3F4;font-family:system-ui;height:100dvh;display:flex;flex-direction:column}.h{padding:14px;display:flex;gap:10px;align-items:center}.h a{font-size:28px;color:#E2D3F4;text-decoration:none} textarea{flex:1;margin:0 14px;background:transparent;border:none;color:#E2D3F4;font-size:17px;outline:none}.b{padding:12px;background:#3F3B62;display:flex;gap:8px} button{background:#4a446b;color:#E2D3F4;border:none;padding:8px 14px;border-radius:20px} #kirim{margin-left:auto;background:#EEC291;color:#332F54;font-weight:700} #prev img,#prev video{width:calc(100% - 28px);margin:0 14px 10px;max-height:300px;object-fit:contain;border-radius:12px;background:#000}</style></head><body>
<div class="h"><a href="index.html">×</a><b>Buat Postingan</b></div>
<textarea id="t" placeholder="Apa yang Anda pikirkan?"></textarea>
<div id="prev"></div>
<div class="b"><button onclick="f.click()">Foto</button><button onclick="t.value+=' @'">Tag</button><button id="kirim" disabled>KIRIM</button></div>
<input type="file" id="f" accept="image/*,video/*" hidden>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./assets/js/supabase-client.js"></script>
<script>
const id=localStorage.puu_id||(localStorage.puu_id='u_'+Math.random().toString(36).slice(2,9)), name=localStorage.puu_name||'Anonim';
const t=document.getElementById('t'),k=document.getElementById('kirim'),p=document.getElementById('prev'),f=document.getElementById('f'); let file;
t.oninput=f.onchange=()=>{k.disabled=!t.value.trim()&&!file};
f.onchange=e=>{file=e.target.files[0]; p.innerHTML=file.type.startsWith('video')?`<video src="${URL.createObjectURL(file)}" controls></video>`:`<img src="${URL.createObjectURL(file)}">`;k.disabled=false};
k.onclick=async()=>{k.disabled=true; let url=null; if(file){const pa=`posts/${Date.now()}_${file.name}`; await sb.storage.from('posts').upload(pa,file); url=sb.storage.from('posts').getPublicUrl(pa).data.publicUrl} await sb.from('posts').insert({user_id:id,username:name,text:t.value,type:'post',media_url:url}); location='index.html'};
</script></body></html>
