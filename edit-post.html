<!DOCTYPE html><html lang="id"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Edit Postingan</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<style>body{margin:0;background:#332F54;color:#E2D3F4;font-family:system-ui;padding:16px}
textarea{width:100%;height:200px;background:#4a4175;border:none;border-radius:12px;color:#fff;padding:12px;font-size:16px}
button{margin-top:12px;padding:12px 24px;border:none;border-radius:10px;font-weight:700}
.save{background:#EEC291;color:#332F54}
.del{background:#7a3a3a;color:#fff;margin-left:8px}
</style>
</head><body>
<h2>Edit Postingan</h2>
<textarea id="txt"></textarea><br>
<button class="save" onclick="save()">Simpan</button>
<button class="del" onclick="hapus()">Hapus</button>
<button onclick="history.back()" style="background:#555;color:#fff">Batal</button>

<script>
const params = new URLSearchParams(location.search);
const id = params.get('id');
const txt = document.getElementById('txt');

async function load(){
 const {data} = await supa.from('posts').select('*').eq('id',id).single();
 if(data) txt.value = data.content || '';
}
load();

async function save(){
 await supa.from('posts').update({content: txt.value}).eq('id',id);
 location.href='index.html';
}
async function hapus(){
 if(confirm('Yakin hapus?')){ await supa.from('posts').delete().eq('id',id); location.href='index.html'; }
}
</script>
</body></html>
