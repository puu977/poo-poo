<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Edit Postingan</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<link rel="stylesheet" href="assets/css/main.css">
<style>
body{margin:0;background:#332F54;color:#E2D3F4;font-family:system-ui}
.top{position:fixed;top:0;left:0;right:0;height:52px;background:#2d2650;display:flex;align-items:center;gap:12px;padding:0 12px;z-index:10}
.wrap{padding:68px 14px;max-width:680px;margin:auto}
textarea{width:100%;min-height:160px;background:#4a4175;border:0;border-radius:12px;color:#fff;padding:12px;font-size:16px}
#prev{width:100%;max-height:320px;object-fit:cover;border-radius:12px;margin-top:12px;display:none}
.btn{margin-top:16px;padding:12px 28px;border:0;border-radius:10px;font-weight:700;background:#EEC291;color:#332F54;cursor:pointer}
</style>
</head>
<body>
<div class="top">
  <a href="index.html" style="color:#E2D3F4;text-decoration:none;font-size:26px">×</a>
  <b>Edit Postingan</b>
</div>
<div class="wrap">
  <textarea id="txt" placeholder="Tulis sesuatu..."></textarea>
  <img id="prev">
  <input type="file" id="file" accept="image/*" style="margin-top:12px">
  <br>
  <button class="btn" onclick="kirim()">KIRIM</button>
</div>

<script>
const id = new URLSearchParams(location.search).get('id');
let cur;
async function load(){
  const {data} = await supa.from('posts').select('*').eq('id',id).single();
  cur = data;
  document.getElementById('txt').value = data.content || '';
  if(data.image_url){
    const p = document.getElementById('prev');
    p.src = data.image_url;
    p.style.display = 'block';
  }
}
load();
document.getElementById('file').onchange = e => {
  const f = e.target.files[0];
  if(f){
    const p = document.getElementById('prev');
    p.src = URL.createObjectURL(f);
    p.style.display = 'block';
  }
};
async function kirim(){
  let url = cur.image_url;
  const f = document.getElementById('file').files[0];
  if(f){
    const path = `posts/${Date.now()}_${f.name}`;
    await supa.storage.from('posts').upload(path, f);
    url = supa.storage.from('posts').getPublicUrl(path).data.publicUrl;
  }
  await supa.from('posts').update({content: document.getElementById('txt').value, image_url: url}).eq('id', id);
  location.href = 'index.html';
}
</script>
</body>
</html>
