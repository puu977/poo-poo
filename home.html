<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beranda – Puu Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
/* Feed addon – Puu classic palette */
.feed-wrap{flex-grow:1;height:100%;overflow-y:auto;padding:0 2px 20px 2px}
.feed-wrap::-webkit-scrollbar{display:none}
.story-row{display:flex;gap:10px;overflow-x:auto;padding:14px 4% 6px 4%;scroll-snap-type:x mandatory}
.story-row::-webkit-scrollbar{display:none}
.story-card{min-width:105px;height:160px;border-radius:16px;background:#3F3b62;position:relative;overflow:hidden;flex-shrink:0;cursor:pointer;border:2px solid #544F7E}
.story-card.add{background:#332F54;display:flex;align-items:flex-end;justify-content:center;padding-bottom:12px}
.story-card img.bg{width:100%;height:100%;object-fit:cover;opacity:.85}
.story-avatar{position:absolute;top:10px;left:10px;width:36px;height:36px;border-radius:50%;border:3px solid #EEC291;object-fit:cover;background:#49426E}
.story-name{position:absolute;bottom:10px;left:10px;right:10px;font-size:11.5px;font-weight:600;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.story-add-btn{width:34px;height:34px;border-radius:50%;background:#EEC291;color:#332F54;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;margin-bottom:6px}
.feed-col{padding:10px 4%}
.post-composer{background:#332F54;border-radius:18px;padding:14px 16px;margin-bottom:14px}
.post-composer-top{display:flex;gap:10px;align-items:center}
.post-composer-top img{width:40px;height:40px;border-radius:50%;border:2px solid #EEC291}
.post-composer-top input{flex:1;background:#49426E;border:1px solid #544F7E;border-radius:999px;padding:10px 16px;color:#E2D3F4;font-size:14px}
.post-composer-top input::placeholder{color:#9b87b9}
.post-composer-actions{display:flex;gap:18px;margin-top:10px;padding-top:10px;border-top:1px solid #49426E;font-size:13px;color:#b9a9d3}
.post-composer-actions button{background:none;border:none;color:#b9a9d3;font-size:13px;cursor:pointer}
.post-composer-actions.send-post{margin-left:auto;color:#332F54;background:#EEC291;padding:6px 16px;border-radius:999px;font-weight:700}
.post-card{background:#332F54;border-radius:18px;padding:14px 16px;margin-bottom:14px}
.post-head{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.post-head img{width:40px;height:40px;border-radius:50%;border:2px solid #EEC291}
.post-head b{color:#E2D3F4;font-size:14px}
.post-head span{display:block;color:#9b87b9;font-size:11.5px}
.post-text{color:#DDD9D0;font-size:14.5px;line-height:1.55;white-space:pre-wrap;margin-bottom:10px}
.post-img{width:100%;border-radius:12px;max-height:420px;object-fit:cover;margin-bottom:8px;background:#49426E}
.post-stats{color:#9b87b9;font-size:12.5px;padding:4px 2px;border-bottom:1px solid #49426E;margin-bottom:6px}
.post-actions{display:flex;justify-content:space-around;padding-top:6px}
.post-actions button{background:none;border:none;color:#b9a9d3;font-size:13.5px;font-weight:600;cursor:pointer;padding:6px 8px;border-radius:8px}
.post-actions button:hover{background:#49426E}
.post-actions button.liked{color:#EEC291}
.right-col{width:260px;flex-shrink:0;display:none}
@media(min-width:1050px){.right-col{display:block} }
.right-card{background:#332F54;border-radius:18px;padding:14px 16px;margin-bottom:12px;color:#b9a9d3;font-size:13px}
.right-card b{color:#E2D3F4}
.feed-layout{display:flex;gap:18px;align-items:flex-start;height:100%;overflow:hidden}
.feed-main{flex:1;min-width:0;height:100%;overflow-y:auto}
.feed-main::-webkit-scrollbar{display:none}
@media(max-width:800px){
 .story-card{min-width:88px;height:138px}
 .post-composer,.post-card{border-radius:16px}
 .feed-col{padding:10px 3%}
 .story-row{padding:12px 3% 4px 3%}
}
input[type=file]{display:none}
</style>
</head>
<body>
<div class="main-container">
  <div class="navbar">
    <div class="nav-left">
      <button class="toggle-btn" id="menuBtn"><img src="https://img.icons8.com/ios-filled/50/E2D3F4/menu--v1.png" alt=""></button>
      <div class="main-logo" style="color:#E2D3F4;font-weight:700;font-size:20px">Puu <span style="color:#EEC291">Chat</span></div>
    </div>
    <div class="nav-right">
      <div class="search-bar"><img src="https://img.icons8.com/ios-glyphs/30/332F54/search--v1.png" alt=""><input type="text" placeholder="Cari di Puu…"></div>
      <a href="pengaturan.html"><img src="https://img.icons8.com/ios-glyphs/30/E2D3F4/settings.png" class="setting" alt=""></a>
      <div class="user" id="userBtn" title="Keluar"><img id="userAvatar" src="https://i.pravatar.cc/80" alt=""></div>
    </div>
  </div>

  <div class="bottom-sec" style="padding-top:0">
    <!-- side menu kiri – pakai style.css kamu -->
    <div class="side-menu" id="sideMenu">
      <div class="search-bar"><img src="https://img.icons8.com/ios-glyphs/30/332F54/search--v1.png" alt=""><input type="text" placeholder="Cari…"></div>
      <ul>
        <li><a href="home.html" class="active">🏠 Beranda</a></li>
        <li><a href="chat.html">💬 Pesan</a></li>
        <li><a href="grup.html">👥 Grup</a></li>
        <li><a href="server.html">🛰️ Server</a></li>
        <li><a href="pengaturan.html">⚙️ Pengaturan</a></li>
        <li><a href="#" id="logoutLink">🚪 Keluar</a></li>
      </ul>
    </div>

    <!-- FEED TENGAH -->
    <div class="feed-layout" style="flex:1;min-width:0;width:100%">
      <div class="feed-main">
        <!-- Stories -->
        <div class="story-row" id="storyRow">
          <div class="story-card add" id="addStoryBtn">
            <div style="text-align:center;color:#b9a9d3;font-size:12px">
              <div class="story-add-btn">+</div>
              Buat story
            </div>
          </div>
        </div>

        <div class="feed-col">
          <!-- Composer -->
          <div class="post-composer">
            <div class="post-composer-top">
              <img id="composerAvatar" src="https://i.pravatar.cc/80" alt="">
              <input type="text" id="postText" placeholder="Apa yang kamu pikirkan?">
            </div>
            <div class="post-composer-actions">
              <button id="pickImgBtn">📷 Foto</button>
              <input type="file" id="postImg" accept="image/*">
              <span id="imgName" style="color:#9b87b9;font-size:12px"></span>
              <button class="send-post" id="sendPostBtn">Kirim</button>
            </div>
          </div>

          <!-- Feed -->
          <div id="feed"></div>
        </div>
      </div>

      <!-- Kolom kanan – desktop only -->
      <div class="right-col">
        <div class="right-card"><b>Kontak</b><br><br><span style="color:#9b87b9">Teman online akan muncul di sini</span></div>
        <div class="right-card"><b>Puu Chat</b><br>Feed status + story, warna classic #49426E</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="storyFile" accept="image/*" style="display:none">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://YOUR-PROJECT.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),2200) }
function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML }
function timeAgo(iso){ const d = (Date.now()-new Date(iso))/1000; if(d<60) return 'baru saja'; if(d<3600) return Math.floor(d/60)+'m'; if(d<86400) return Math.floor(d/3600)+'j'; return Math.floor(d/86400)+'h' }

let user=null;

(async ()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session){ location.replace('login.html'); return }
  user = session.user;
  const av = `https://i.pravatar.cc/80?u=${user.id}`;
  document.getElementById('userAvatar').src = av;
  document.getElementById('composerAvatar').src = av;
  loadStories(); loadPosts();
  sb.channel('posts-feed').on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'}, p=>{
    prependPost(p.new, true)
  }).subscribe();
})();

// Stories
async function loadStories(){
  const row = document.getElementById('storyRow');
  [...row.querySelectorAll('.story-card:not(.add)')].forEach(n=>n.remove());
  const { data } = await sb.from('stories').select('*').gte('expires_at', new Date().toISOString()).order('created_at',{ascending:false}).limit(12);
  (data||[]).forEach(s=>{
    const el = document.createElement('div');
    el.className='story-card';
    el.innerHTML = `<img class="bg" src="${esc(s.image_url)}"><img class="story-avatar" src="https://i.pravatar.cc/60?u=${s.user_id}"><div class="story-name">${esc(s.username||'teman')}</div>`;
    row.appendChild(el);
  });
}
document.getElementById('addStoryBtn').onclick = ()=> document.getElementById('storyFile').click();
document.getElementById('storyFile').addEventListener('change', async e=>{
  const f = e.target.files[0]; if(!f) return;
  toast('Upload story…');
  const path = `${user.id}/${Date.now()}_${f.name}`;
  const { error:upErr } = await sb.storage.from('posts').upload(path, f, {upsert:false});
  if(upErr){ toast(upErr.message); return }
  const { data:{publicUrl} } = sb.storage.from('posts').getPublicUrl(path);
  const expires = new Date(Date.now()+24*3600*1000).toISOString();
  await sb.from('stories').insert({ user_id:user.id, image_url:publicUrl, expires_at:expires });
  toast('Story terkirim');
  loadStories();
  e.target.value='';
});

// Posts
document.getElementById('pickImgBtn').onclick = ()=> document.getElementById('postImg').click();
document.getElementById('postImg').addEventListener('change', e=>{
  document.getElementById('imgName').textContent = e.target.files[0]?.name || '';
});

async function loadPosts(){
  const { data } = await sb.from('posts').select('*').order('created_at',{ascending:false}).limit(40);
  document.getElementById('feed').innerHTML='';
  (data||[]).forEach(p=> prependPost(p, false));
}

function postHTML(p){
  const name = p.username || (p.user_id||'').slice(0,8);
  const avatar = `https://i.pravatar.cc/60?u=${p.user_id}`;
  return `<div class="post-head"><img src="${avatar}"><div><b>${esc(name)}</b><span>${timeAgo(p.created_at)} • 🌎</span></div></div>
  ${p.content? `<div class="post-text">${esc(p.content)}</div>` : ''}
  ${p.image_url? `<img class="post-img" src="${esc(p.image_url)}" loading="lazy">` : ''}
  <div class="post-stats">${p.likes||0} suka • ${p.comments_count||0} komentar</div>
  <div class="post-actions">
    <button onclick="likePost('${p.id}', this)">👍 Suka</button>
    <button onclick="toast('Komentar segera')">💬 Komentar</button>
    <button onclick="toast('Dibagikan')">↗️ Bagikan</button>
  </div>`;
}

function prependPost(p, top){
  const el = document.createElement('div');
  el.className='post-card'; el.dataset.id=p.id;
  el.innerHTML = postHTML(p);
  const feed = document.getElementById('feed');
  if(top && feed.firstChild) feed.insertBefore(el, feed.firstChild); else feed.appendChild(el);
}

document.getElementById('sendPostBtn').onclick = async ()=>{
  const text = document.getElementById('postText').value.trim();
  const file = document.getElementById('postImg').files[0];
  if(!text &&!file){ toast('Tulis sesuatu dulu'); return }
  const btn = document.getElementById('sendPostBtn'); btn.disabled=true; btn.textContent='…';
  let image_url = null;
  if(file){
    const path = `${user.id}/${Date.now()}_${file.name}`;
    const { error } = await sb.storage.from('posts').upload(path, file);
    if(error){ toast(error.message); btn.disabled=false; btn.textContent='Kirim'; return }
    image_url = sb.storage.from('posts').getPublicUrl(path).data.publicUrl;
  }
  const { error } = await sb.from('posts').insert({ user_id:user.id, content:text||null, image_url });
  btn.disabled=false; btn.textContent='Kirim';
  if(error){ toast(error.message); return }
  document.getElementById('postText').value=''; document.getElementById('postImg').value=''; document.getElementById('imgName').textContent='';
  toast('Terkirim');
};

async function likePost(id, btn){
  btn.classList.toggle('liked');
  const { data } = await sb.from('posts').select('likes').eq('id', id).single();
  await sb.from('posts').update({ likes: (data?.likes||0)+1 }).eq('id', id);
}

// UI misc
document.getElementById('menuBtn').onclick = ()=> document.getElementById('sideMenu').classList.toggle('active');
async function doLogout(){ await sb.auth.signOut(); location.replace('login.html') }
document.getElementById('logoutLink').onclick = e=>{ e.preventDefault(); doLogout() };
document.getElementById('userBtn').onclick = doLogout;
</script>
</body>
        </html>
