<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puu-Puu Server</title>

<link rel="stylesheet" href="css/style.css">

<style>
/* ===== DISCORD LAYOUT ===== */
.discord {
    display: flex;
    height: 100vh;
    background: #332F54;
}

/* SERVER BAR */
.server-bar {
    width: 70px;
    background: #49426E;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0;
    gap: 15px;
}

.server {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: #EEC291;
    cursor: pointer;
}

/* CHANNEL LIST */
.channel-bar {
    width: 250px;
    background: #3a355a;
    padding: 15px;
    color: #E2D3F4;
}

/* CHAT AREA */
.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.chat-header {
    padding: 15px;
    border-bottom: 1px solid #444;
    color: #E2D3F4;
}

.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

.input-box {
    display: flex;
    padding: 10px;
    gap: 10px;
    background: #2c2748;
}

.input-box input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    background: #49426E;
    color: white;
}

button {
    background: #EEC291;
    padding: 10px;
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="discord">

    <!-- SERVER LIST -->
    <div class="server-bar" id="serverList"></div>

    <!-- CHANNEL LIST -->
    <div class="channel-bar">
        <h3>Channels</h3>
        <div id="channelList"></div>
    </div>

    <!-- CHAT -->
    <div class="chat-area">

        <div class="chat-header">
            # general
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-box">
            <button onclick="translateLeft()">⬅️</button>
            <input id="msgInput" placeholder="Tulis pesan...">
            <button onclick="translateRight()">➡️</button>
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<script src="js/server.js"></script>

</body>
</html>
