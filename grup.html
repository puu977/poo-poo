<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grup – Puu Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
:root{--puu:#49426E;--puu2:#332F54;--gold:#EEC291;--txt:#E2D3F4;--muted:#9b87b9}
.grup-layout{display:flex;flex:1;min-width:0;height:calc(100vh - 64px);overflow:hidden}
/* kiri */
.grup-list{width:330px;flex-shrink:0;background:var(--puu2);border-right:1px solid var(--puu);display:flex;flex-direction:column}
.gl-head{padding:14px 14px 10px 14px;border-bottom:1px solid var(--puu)}
.gl-head b{color:var(--txt)}
.gl-search{width:100%;box-sizing:border-box;background:var(--puu);border:1px solid #544F7E;border-radius:10px;padding:8px 12px;color:var(--txt);margin-top:8px;font-family:'Poppins',sans-serif}
.gl-search::placeholder{color:var(--muted)}
.gl-tabs{display:flex;gap:12px;padding:8px 14px;font-size:12.5px;color:var(--muted);border-bottom:1px solid #3b375e}
.gl-tabs span.active{color:var(--gold);font-weight:600}
.grup-items{flex:1;overflow-y:auto}
.grup-items::-webkit-scrollbar{display:none}
.grup-item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid #3b375e}
.grup-item:hover,.grup-item.active{background:var(--puu)}
.grup-item img{width:44px;height:44px;border-radius:50%;border:2px solid #544F7E;object-fit:cover;background:#3F3b62}
.grup-item b{color:var(--txt);font-size:13.5px}
.grup-item span{color:var(--muted);font-size:11.5px}
.empty-groups{padding:28px 14px;text-align:center;color:var(--muted);font-size:13px}
.btn-new{background:var(--gold);color:#332F54;border:none;border-radius:999px;padding:7px 14px;font-weight:700;font-size:12.5px;cursor:pointer}

/* kanan */
.grup-main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--puu)}
.g-banner{height:140px;background:linear-gradient(135deg,#332F54,#49426E);position:relative;flex-shrink:0}
.g-banner img{width:100%;height:100%;object-fit:cover}
.g-head{padding:12px 16px;background:var(--puu2);border-bottom:1px solid var(--puu);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.g-head img.ava{width:56px;height:56px;border-radius:50%;border:3px solid var(--gold);margin-top:-28px;background:#3F3b62;object-fit:cover}
.g-head h3{margin:0;color:var(--txt);font-size:16px}
.g-head.meta{color:var(--muted);font-size:12px}
.badge{background:#49426E;border:1px solid #544F7E;border-radius:999px;padding:3px 9px;font-size:11px;color:var(--txt)}
.g-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.icon-btn{background:#49426E;border:1px solid #544F7E;color:var(--txt);border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer}
.icon-btn.primary{background:var(--gold);color:#332F54;border-color:var(--gold);font-weight:700}

.g-tabs{display:flex;gap:18px;padding:0 16px;background:var(--puu2);border-bottom:1px solid var(--puu);font-size:13px;color:var(--muted)}
.g-tabs button{background:none;border:none;color:inherit;padding:10px 0;cursor:pointer;font-family:'Poppins',sans-serif}
.g-tabs button.active{color:var(--gold);border-bottom:2px solid var(--gold)}

.g-body{flex:1;overflow-y:auto;padding:14px 16px}
.g-body::-webkit-scrollbar{display:none}

/* sematan */
.pinned{background:#332F54;border:1px solid #544F7E;border-radius:12px;padding:12px 14px;margin-bottom:12px;color:#DDD9D0;font-size:13.5px}
.pinned b{color:var(--gold);font-size:12px}

/* messages */
.msg{display:flex;gap:10px;margin-bottom:14px}
.msg.mine{flex-direction:row-reverse}
.msg img{width:34px;height:34px;border-radius:50%;border:2px solid #544F7E;object-fit:cover;background:#3F3b62}
.msg-bubble{max-width:68%;background:#332F54;border-radius:14px;padding:8px 12px}
.msg.mine.msg-bubble{background:#5b4e7a}
.msg-bubble h4{margin:0 0 2px 0;font-size:12.5px;color:var(--gold)}
.msg-bubble h4 span{color:var(--muted);font-weight:400;font-size:11px}
.msg-bubble p{margin:0;color:#DDD9D0;font-size:13.5px;white-space:pre-wrap}

.composer{display:flex;gap:8px;padding:12px 14px;background:#332F54;border-top:1px solid var(--puu);align-items:center}
.composer input{flex:1;background:#49426E;border:1px solid #544F7E;border-radius:999px;padding:10px 14px;color:var(--txt);font-size:14px}
.composer input::placeholder{color:var(--muted)}
.composer button{background:var(--gold);color:#332F54;border:none;border-radius:999px;padding:9px 16px;font-weight:700;cursor:pointer}

/* anggota list */
.member{display:flex;align-items:center;gap:10px;padding:10px;background:#332F54;border-radius:12px;margin-bottom:8px}
.member img{width:38px;height:38px;border-radius:50%;border:2px solid #544F7E;object-fit:cover;background:#3F3b62}
.member b{color:var(--txt);font-size:13.5px}
.member span{color:var(--muted);font-size:11.5px}
.role-tag{background:#49426E;border:1px solid #544F7E;border-radius:6px;padding:2px 7px;font-size:10.5px;color:var(--gold);margin-left:6px}
.member.act{margin-left:auto;display:flex;gap:6px}
.mini-btn{background:#49426E;border:1px solid #544F7E;color:var(--txt);border-radius:7px;padding:4px 8px;font-size:11px;cursor:pointer}
.mini-btn.danger{color:#ffb3b3;border-color:#6a3a3a}

.empty-chat{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:20px}

/* modal */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:50}
.modal-back.show{display:flex}
.modal{background:#332F54;border-radius:16px;padding:18px;width:90%;max-width:380px;color:var(--txt)}
.modal h3{margin:0 0 12px 0;color:var(--gold)}
.modal input,.modal textarea,.modal select{width:100%;box-sizing:border-box;background:#49426E;border:1px solid #544F7E;border-radius:10px;padding:10px 12px;color:var(--txt);margin-bottom:10px;font-family:'Poppins',sans-serif}
.modal.row{display:flex;gap:8px;justify-content:flex-end}
.btn-ghost{background:#49426E;color:var(--txt);border:1px solid #544F7E;border-radius:10px;padding:8px 14px;cursor:pointer}
.btn-primary{background:var(--gold);color:#332F54;border:none;border-radius:10px;padding:8px 14px;font-weight:700;cursor:pointer}

@media(max-width:860px){
 .grup-list{width:100%;border-right:none}
 .grup-list.hide{display:none}
 .grup-main{width:100%;display:none}
 .grup-main.show{display:flex}
}
</style>
</head>
<body>
<div class="main-container">
  <div class="navbar">
    <div class="nav-left">
      <button class="toggle-btn" id="menuBtn"><img src="https://img.icons8.com/ios-filled/50/E2D3F4/menu--v1.png" alt=""></button>
      <div class="main-logo" style="color:#E2D3F4;font-weight:700;font-size:20px">Puu <span style="color:#EEC291">Chat</span></div>
    </div>
    <div class="nav-right">
      <a href="settings.html"><img src="https://img.icons8.com/ios-glyphs/30/E2D3F4/settings.png" class="setting" alt=""></a>
      <div class="user" id="userBtn"><img id="userAvatar" src="" alt=""></div>
    </div>
  </div>

  <div class="bottom-sec" style="padding-top:0">
    <div class="side-menu" id="sideMenu">
      <ul>
        <li><a href="home.html">🏠 Beranda</a></li>
        <li><a href="chat.html">💬 Pesan</a></li>
        <li><a href="grup.html" class="active">👥 Grup</a></li>
        <li><a href="server.html">🛰️ Server</a></li>
        <li><a href="settings.html">⚙️ Pengaturan</a></li>
        <li><a href="#" id="logoutLink">🚪 Keluar</a></li>
      </ul>
    </div>

    <div class="grup-layout" style="flex:1;min-width:0;width:100%">
      <!-- kiri: daftar grup -->
      <div class="grup-list" id="grupListPane">
        <div class="gl-head">
          <div style="display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:4px">
            <b>Grup Pesan</b>
            <button class="btn-new" id="newGroupBtn">+ Buat</button>
          </div>
          <input class="gl-search" id="groupSearch" placeholder="Cari grup publik…">
        </div>
        <div class="gl-tabs">
          <span class="active" data-filter="mine">Grup Saya</span>
          <span data-filter="public" style="cursor:pointer">Jelajah Publik</span>
        </div>
        <div class="grup-items" id="grupItems"></div>
      </div>

      <!-- kanan: detail grup -->
      <div class="grup-main" id="grupMain">
        <div class="empty-chat" id="emptyChat">
          <div>💬<br><b>Pilih grup untuk mulai chat</b><br>Belum ada grup? Buat dulu di tombol + Buat</div>
        </div>

        <div id="groupView" style="display:none;flex:1;flex-direction:column;min-height:0">
          <div class="g-banner" id="gBanner"></div>
          <div class="g-head">
            <img class="ava" id="ghAvatar" src="" alt="">
            <div style="flex:1;min-width:120px">
              <h3 id="ghName">-</h3>
              <div class="meta"><span id="ghPrivacy">Publik</span> • <span id="ghMembers">0 anggota</span></div>
            </div>
            <div class="g-actions">
              <button class="icon-btn" id="translateBtn" title="Translate otomatis">🔄</button>
              <button class="icon-btn" id="leaveBtn">Keluar</button>
              <button class="icon-btn primary" id="settingsBtn">Pengaturan Grup</button>
            </div>
          </div>
          <div class="g-tabs">
            <button class="active" data-tab="diskusi">Diskusi</button>
            <button data-tab="tentang">Tentang</button>
            <button data-tab="anggota">Anggota</button>
          </div>

          <!-- Diskusi -->
          <div class="g-body" id="tab-diskusi">
            <div class="pinned" id="pinnedBox" style="display:none">
              <b>📌 SEMATAN GRUP</b>
              <div id="pinnedText" style="margin-top:4px"></div>
            </div>
            <div id="grupMessages"></div>
          </div>
          <!-- Tentang -->
          <div class="g-body" id="tab-tentang" style="display:none">
            <div class="pinned"><b>Tentang Grup</b><div id="aboutText" style="margin-top:6px;color:#DDD9D0"></div></div>
          </div>
          <!-- Anggota -->
          <div class="g-body" id="tab-anggota" style="display:none">
            <div style="display:flex;gap:8px;margin-bottom:10px">
              <input id="addMemberInput" placeholder="Tambah anggota – username" style="flex:1;background:#332F54;border:1px solid #544F7E;border-radius:10px;padding:9px 12px;color:#E2D3F4;font-family:'Poppins',sans-serif">
              <button class="icon-btn primary" id="addMemberBtn">+ Tambah</button>
            </div>
            <div id="memberList"></div>
          </div>

          <div class="composer" id="grupComposer">
            <input id="msgInput" type="text" placeholder="Tulis pesan grup…">
            <button id="sendBtn">Kirim</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- modal buat grup -->
<div class="modal-back" id="groupModal">
  <div class="modal">
    <h3>Buat Grup Baru</h3>
    <input id="gName" type="text" placeholder="Nama grup" maxlength="40">
    <select id="gPrivacy">
      <option value="publik">🌎 Publik – bisa dicari</option>
      <option value="privat">🔒 Privat – undangan saja</option>
      <option value="rahasia">👁️ Rahasia – tidak tampil di pencarian</option>
    </select>
    <input id="gAvatarFile" type="file" accept="image/*">
    <div class="row">
      <button class="btn-ghost" id="cancelGroupBtn">Batal</button>
      <button class="btn-primary" id="createGroupBtn">Buat</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://gttedpjwqgiyszmrcnoe.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0dGVkcGp3cWdpeXN6bXJjbm9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjk3MjIsImV4cCI6MjA5Njk0NTcyMn0.GzouEkyd6pRvT_IQuNR7LTyN6ewPiCTj2Xqu8l9yEcY";
const BLANK_AVATAR = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iODAiIHZpZXdCb3g9IjAgMCA4MCA4MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSI0MCIgY3k9IjQwIiByPSI0MCIgZmlsbD0iIzNGM2I2MiIvPjxjaXJjbGUgY3g9IjQwIiBjeT0iMzIiIHI9IjEyIiBmaWxsPSIjNTQ0RjdFIi8+PHBhdGggZD0iTTIwIDYyQzIwIDUwIDI4IDQ4IDQwIDQ4UzYwIDUwIDYwIDYyIiBmaWxsPSIjNTQ0RjdFIi8+PC9zdmc+';
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),2000) }
function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML }

let sb=null, user=null, currentGroup=null, translateOn = localStorage.getItem('puu_translate')==='1';
document.getElementById('userAvatar').src = BLANK_AVATAR;

if(SUPABASE_URL && SUPABASE_ANON_KEY){
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  sb.auth.getSession().then(({data:{session}})=>{ if(session){ user=session.user; loadGroups(); } else { loadGroups(); } });
} else { loadGroups(); }

function safeProfile(p){ const b=!p||p.is_blocked||!p.user_id; if(b) return {name:'user', avatar:BLANK_AVATAR}; return {name:p.username||p.display_name||'user', avatar:p.avatar_url||`https://i.pravatar.cc/60?u=${p.user_id}`} }

let allGroups = JSON.parse(localStorage.getItem('puu_groups')||'[]');
function saveGroups(){ localStorage.setItem('puu_groups', JSON.stringify(allGroups)); }

async function loadGroups(){
  let groups = allGroups;
  if(sb && user){
    try{ const {data} = await sb.from('groups').select('*').order('created_at',{ascending:false}); if(data && data.length) groups = data }catch(e){}
  }
  renderGroupList(groups, 'mine');
  document.querySelectorAll('.gl-tabs span').forEach(s=> s.onclick = ()=>{
    document.querySelectorAll('.gl-tabs span').forEach(x=>x.classList.remove('active')); s.classList.add('active');
    renderGroupList(groups, s.dataset.filter);
  });
  document.getElementById('groupSearch').oninput = e=>{
    const q = e.target.value.toLowerCase();
    const filtered = groups.filter(g=> (g.privacy||'publik')==='publik' && g.name.toLowerCase().includes(q));
    renderGroupList(filtered, 'public', true);
  };
}

function renderGroupList(groups, filter, isSearch=false){
  const box = document.getElementById('grupItems');
  let list = groups;
  if(filter==='mine' &&!isSearch){ /* tampilkan semua milik user, kalau kosong = kosong */ }
  if(filter==='public'){ list = groups.filter(g=> (g.privacy||'publik')==='publik'); }
  if(list.length===0){
    box.innerHTML = `<div class="empty-groups">Tidak ada grup<br><button class="btn-new" style="margin-top:10px" onclick="document.getElementById('newGroupBtn').click()">+ Buat Grup Pertama</button></div>`;
    return;
  }
  box.innerHTML = '';
  list.forEach(g=>{
    const el = document.createElement('div');
    el.className='grup-item' + (currentGroup && currentGroup.id===g.id? ' active':'');
    el.innerHTML = `<img src="${g.avatar_url||BLANK_AVATAR}" onerror="this.src='${BLANK_AVATAR}'"><div><b>${esc(g.name)}</b><span>${esc(g.privacy||'publik')} • ${g.members_count||1} anggota</span></div>`;
    el.onclick = ()=> openGroup(g);
    box.appendChild(el);
  });
}

function openGroup(g){
  currentGroup = {...g, members: g.members || [{id:'admin', username:'admin', role:'admin'}, {id:'u1', username:'user', role:'member'}], pinned: g.pinned || ''};
  document.getElementById('emptyChat').style.display='none';
  document.getElementById('groupView').style.display='flex';
  document.getElementById('ghName').textContent = g.name;
  document.getElementById('ghAvatar').src = g.avatar_url || BLANK_AVATAR;
  document.getElementById('ghPrivacy').textContent = ({publik:'Publik', privat:'Privat', rahasia:'Rahasia'}[g.privacy]||'Publik');
  document.getElementById('ghMembers').textContent = (g.members_count||currentGroup.members.length) + ' anggota';
  document.getElementById('gBanner').style.backgroundImage = g.banner_url? `url(${g.banner_url})` : '';
  document.getElementById('gBanner').style.backgroundSize = 'cover';
  // pinned
  const pBox = document.getElementById('pinnedBox');
  if(currentGroup.pinned){ pBox.style.display='block'; document.getElementById('pinnedText').textContent = currentGroup.pinned } else { pBox.style.display='none' }
  // tentang
  document.getElementById('aboutText').textContent = g.description || 'Belum ada deskripsi grup.';
  renderMembers();
  loadMessages();
  // mobile
  if(window.innerWidth <= 860){ document.getElementById('grupListPane').classList.add('hide'); document.getElementById('grupMain').classList.add('show'); }
  // tabs
  document.querySelectorAll('.g-tabs button').forEach(b=> b.onclick = ()=>{
    document.querySelectorAll('.g-tabs button').forEach(x=>x.classList.remove('active')); b.classList.add('active');
    const tab = b.dataset.tab;
    document.getElementById('tab-diskusi').style.display = tab==='diskusi'?'block':'none';
    document.getElementById('tab-tentang').style.display = tab==='tentang'?'block':'none';
    document.getElementById('tab-anggota').style.display = tab==='anggota'?'block':'none';
    document.getElementById('grupComposer').style.display = tab==='diskusi'?'flex':'none';
  });
}

function renderMembers(){
  const box = document.getElementById('memberList');
  box.innerHTML = '';
  (currentGroup.members||[]).forEach(m=>{
    const isAdmin = m.role==='admin';
    const isMod = m.role==='moderator';
    const div = document.createElement('div');
    div.className='member';
    div.innerHTML = `<img src="${BLANK_AVATAR}"><div><b>${esc(m.username)}${isAdmin?'<span class="role-tag">Admin</span>':''}${isMod?'<span class="role-tag">Mod</span>':''}</b><span>${isAdmin?'Pemilik grup':isMod?'Moderator':'Anggota'}</span></div>
    <div class="act">
      ${!isAdmin? `<button class="mini-btn" onclick="toggleMod('${m.id}')">${isMod?'- Mod':'+ Mod'}</button>`:''}
      ${!isAdmin? `<button class="mini-btn danger" onclick="removeMember('${m.id}')">Keluarkan</button>`:''}
    </div>`;
    box.appendChild(div);
  });
}
window.toggleMod = function(id){
  const m = currentGroup.members.find(x=>x.id===id); if(!m) return;
  m.role = m.role==='moderator'? 'member' : 'moderator';
  toast(m.role==='moderator'? 'Dijadikan moderator' : 'Moderator dicabut');
  renderMembers();
}
window.removeMember = function(id){
  currentGroup.members = currentGroup.members.filter(x=>x.id!==id);
  toast('Anggota dikeluarkan');
  renderMembers();
}

function loadMessages(){
  const box = document.getElementById('grupMessages');
  box.innerHTML = '<div style="color:#9b87b9;font-size:13px">Belum ada pesan di grup ini.</div>';
}
document.getElementById('sendBtn').onclick = ()=>{
  const inp = document.getElementById('msgInput');
  const t = inp.value.trim(); if(!t ||!currentGroup) return;
  inp.value='';
  const box = document.getElementById('grupMessages');
  if(box.textContent.includes('Belum ada pesan')) box.innerHTML='';
  const div = document.createElement('div');
  div.className='msg mine';
  let out = t;
  if(translateOn){ out = '[ID] ' + t } // stub translate
  div.innerHTML = `<img src="${BLANK_AVATAR}"><div class="msg-bubble"><h4>kamu <span>• sekarang</span></h4><p>${esc(out)}</p></div>`;
  box.appendChild(div); box.scrollTop = box.scrollHeight;
};
document.getElementById('msgInput').addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); document.getElementById('sendBtn').click() }});

// tambah anggota
document.getElementById('addMemberBtn').onclick = ()=>{
  const v = document.getElementById('addMemberInput').value.trim();
  if(!v) return;
  currentGroup.members.push({id:'u'+Date.now(), username:v, role:'member'});
  document.getElementById('addMemberInput').value='';
  toast('Anggota ' + v + ' ditambahkan');
  renderMembers();
};

// translate toggle
const tBtn = document.getElementById('translateBtn');
function syncTranslate(){ tBtn.style.opacity = translateOn? '1' : '.6'; tBtn.textContent = translateOn? '🔄 ID' : '🔄' }
syncTranslate();
tBtn.onclick = ()=>{ translateOn =!translateOn; localStorage.setItem('puu_translate', translateOn?'1':'0'); syncTranslate(); toast(translateOn? 'Translate otomatis ON' : 'Translate OFF') };

// buat grup
document.getElementById('newGroupBtn').onclick = ()=> document.getElementById('groupModal').classList.add('show');
document.getElementById('cancelGroupBtn').onclick = ()=> document.getElementById('groupModal').classList.remove('show');
document.getElementById('createGroupBtn').onclick = ()=>{
  const name = document.getElementById('gName').value.trim();
  if(!name){ toast('Isi nama grup'); return }
  const privacy = document.getElementById('gPrivacy').value;
  const g = {id:'g_'+Date.now(), name, privacy, avatar_url:null, banner_url:null, members_count:1, description:'', pinned:''};
  allGroups.unshift(g); saveGroups();
  document.getElementById('groupModal').classList.remove('show');
  document.getElementById('gName').value='';
  loadGroups();
  setTimeout(()=> openGroup(g), 150);
  toast('Grup dibuat');
};

// keluar grup / settings
document.getElementById('leaveBtn').onclick = ()=>{
  if(!currentGroup) return;
  if(confirm('Keluar dari grup "'+currentGroup.name+'"?')){
    allGroups = allGroups.filter(x=>x.id!== currentGroup.id); saveGroups();
    toast('Keluar grup');
    location.reload();
  }
};
document.getElementById('settingsBtn').onclick = ()=>{
  if(!currentGroup){ toast('Pilih grup dulu'); return }
  localStorage.setItem('puu_edit_group', JSON.stringify(currentGroup));
  location.href = 'group-settings.html?id=' + encodeURIComponent(currentGroup.id);
};

// nav
document.getElementById('menuBtn').onclick = ()=> document.getElementById('sideMenu').classList.toggle('active');
async function doLogout(){ if(sb) await sb.auth.signOut(); location.replace('login.html') }
document.getElementById('logoutLink').onclick = e=>{ e.preventDefault(); doLogout() };
document.getElementById('userBtn').onclick = doLogout;
</script>
</body>
</html>
