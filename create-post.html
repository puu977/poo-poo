<!DOCTYPE html><html lang="id"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Buat Postingan</title>
<link rel="stylesheet" href="./assets/css/main.css">
<style>
.buat-area{padding:20px;height:100%;display:flex;flex-direction:column;gap:15px}
.buat-area textarea{flex:1;background:transparent;border:none;color:#E2D3F4;font-size:18px;resize:none;outline:none}
.buat-area textarea::placeholder{color:#9386a2}
.preview img,.preview video{max-width:100%;border-radius:12px;margin-top:10px}
.top-bar{display:flex;align-items:center;gap:15px;padding:15px 4%;border-bottom:2px solid #544F7E}
.top-bar a{color:#E2D3F4;font-size:28px;text-decoration:none}
.top-bar h2{color:#E2D3F4;margin:0;font-size:20px}
</style>
</head><body>
<div class="main-container">
  <div class="top-bar">
    <a href="index.html">×</a>
    <h2>Postingan Baru</h2>
  </div>
  
  <div class="bottom-sec" style="padding:0;height:calc(76.5vh - 60px)">
    <div class="chat-section" style="width:100%;height:100%">
      <div class="buat-area">
        <div style="display:flex;gap:12px;align-items:center">
          <div id="ava" style="width:45px;height:45px;border-radius:50%;background:#49426E;border:2px solid #EEC291"></div>
          <div>
            <p id="nama" style="color:#E2D3F4;font-weight:500;margin:0">Anonim</p>
            <select id="priv" style="background:#3F3B62;color:#E2D3F4;border:none;padding:2px 8px;border-radius:6px;font-size:12px;margin-top:3px">
              <option>Publik</option><option>Teman</option><option>Hanya saya</option>
            </select>
          </div>
        </div>
        
        <textarea id="txt" placeholder="Apa yang Anda pikirkan?" autofocus></textarea>
        <div class="preview" id="prev"></div>
      </div>

      <div class="chat-type">
        <img onclick="fImg.click()" title="Foto/Video" style="cursor:pointer;width:26px" src="data:image/svg+xml;base64,PHN2ZyBmaWxsPSIjRTJEM0Y0IiB2aWV3Qm94PSIwIDAgMjQiPjxwYXRoIGQ9Ik0yMSAxOVY1YzAtMS4xLS45LTItMi0ySDVjLTEuMSAwLTIgLjktMiAydjE0YzAgMS4xLjkgMiAyIDJoMTRjMS4xIDAgMi0uOSAyLTJ6TTEyIDE3bC0zLjUtNC41IDIuNS0zLjAxTDE0IDEzbDMuNS00LjVMMjEgMTN2NkgzeiIvPjwvc3ZnPg==">
        <img onclick="fMus.click()" title="Musik" style="cursor:pointer;width:24px" src="data:image/svg+xml;base64,PHN2ZyBmaWxsPSIjRTJEM0Y0IiB2aWV3Qm94PSIwIDAgMjQiPjxwYXRoIGQ9Ik0xMiAzVjEzbC00IDNWN2w0LTN6bTggNlY1bC00IDN2NGw0LTN6Ii8+PC9zdmc+">
        <div class="message-type" style="flex:1;border:none;padding:0;background:transparent"></div>
        <button id="kirim" style="background:#EEC291;color:#332F54;padding:8px 18px;border-radius:12px;font-weight:600;opacity:.5;cursor:pointer">Kirim</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="fImg" accept="image/*,video/*" hidden>
<input type="file" id="fMus" accept="audio/*" hidden>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./assets/js/supabase-client.js"></script>
<script>
if(!localStorage.puu_id) localStorage.puu_id='u_'+Math.random().toString(36).slice(2,9);
const myId=localStorage.puu_id;
const myName=localStorage.puu_name||'Anonim';
const myAvatar=localStorage.puu_avatar||'';
document.getElementById('nama').textContent=myName;
if(myAvatar) document.getElementById('ava').style.background=`url(${myAvatar}) center/cover`;

const txt=document.getElementById('txt'), kirim=document.getElementById('kirim'), prev=document.getElementById('prev');
let fileMedia=null, fileMusik=null;

function cek(){const ada=txt.value.trim()||fileMedia;kirim.style.opacity=ada?1:.5;kirim.disabled=!ada}
txt.oninput=cek;

fImg.onchange=e=>{fileMedia=e.target.files[0];prev.innerHTML=fileMedia.type.startsWith('video')?`<video src="${URL.createObjectURL(fileMedia)}" controls style="max-height:300px"></video>`:`<img src="${URL.createObjectURL(fileMedia)}">`;cek()}
fMus.onchange=e=>{fileMusik=e.target.files[0];prev.innerHTML+=`<p style="color:#EEC291;margin-top:8px">🎵 ${fileMusik.name}</p>`;cek()}

kirim.onclick=async()=>{
 if(kirim.disabled) return;
 kirim.disabled=true;kirim.textContent='Mengirim...';
 try{
  let media_url=null;
  if(fileMedia){
    const path=`posts/${Date.now()}_${fileMedia.name}`;
    const up=await sb.storage.from('posts').upload(path,fileMedia);
    if(up.error) throw up.error;
    media_url=sb.storage.from('posts').getPublicUrl(path).data.publicUrl;
  }
  const {error}=await sb.from('posts').insert({
    user_id:myId,
    user:myName,
    text:txt.value.trim(),
    media_url:media_url,
    privacy:document.getElementById('priv').value
  });
  if(error) throw error;
  location='index.html';
 }catch(err){alert('Gagal: '+err.message);kirim.disabled=false;kirim.textContent='Kirim';}
};
cek();
</script>
</body></html>
