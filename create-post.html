<!DOCTYPE html><html lang="id"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Buat Postingan</title>
<link rel="stylesheet" href="./assets/css/main.css">
<style>
*{box-sizing:border-box} html,body{margin:0;height:100%;background:#332F54;color:#E2D3F4;font-family:system-ui}
.buat-wrap{height:100dvh;display:flex;flex-direction:column}
.top-bar{display:flex;align-items:center;gap:12px;padding:12px 14px}
.top-bar a{color:#E2D3F4;font-size:26px;text-decoration:none}
.top-bar h2{margin:0;font-size:18px;font-weight:600}
.buat-area{flex:1;padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.info{display:flex;gap:10px;align-items:center}
#ava{width:42px;height:42px;border-radius:50%;background:#49426E;border:2px solid #EEC291;flex-shrink:0;background-size:cover;background-position:center}
#nama{margin:0;font-weight:500;font-size:15px}
#priv{background:#3F3B62;color:#E2D3F4;border:none;padding:4px 8px;border-radius:6px;font-size:12px;margin-top:4px}
#txt{flex:1;min-height:120px;background:transparent;border:none;color:#E2D3F4;font-size:16px;resize:none;outline:none;width:100%}
#txt::placeholder{color:#8a7ca3}
#prev img,#prev video{width:100%;max-height:260px;object-fit:contain;border-radius:12px;background:#000;margin-top:8px;display:block}
.toolbar{display:flex;gap:6px;padding:8px 10px;background:#3F3B62;border-top:1px solid #544F7E;overflow-x:auto}
.toolbar::-webkit-scrollbar{display:none}
.tool{flex-shrink:0;background:#4a446b;color:#E2D3F4;border:none;padding:7px 12px;border-radius:20px;font-size:12px}
.kirim-bar{padding:10px 12px;background:#332F54;border-top:1px solid #544F7E;text-align:right}
#kirim{background:#EEC291;color:#332F54;padding:9px 26px;border-radius:10px;font-weight:700;border:none;font-size:14px;opacity:.5}
#kirim:enabled{opacity:1}
</style>
</head><body>
<div class="buat-wrap">
  <div class="top-bar"><a href="index.html">×</a><h2>Postingan Baru</h2></div>

  <div class="buat-area">
    <div class="info">
      <div id="ava"></div>
      <div>
        <p id="nama">Anonim</p>
        <select id="priv"><option>Publik</option><option>Teman</option><option>Hanya saya</option></select>
      </div>
    </div>

    <textarea id="txt" placeholder="Apa yang Anda pikirkan?"></textarea>
    <div id="prev"></div>
  </div>

  <div class="toolbar" id="toolbar">
    <button class="tool" data-a="live">🔴 Siaran</button>
    <button class="tool" data-a="foto">🖼️ Foto</button>
    <button class="tool" data-a="lokasi">📍 Lokasi</button>
    <button class="tool" data-a="main">🎮 Main</button>
    <button class="tool" data-a="tagar">@ Tag</button>
  </div>

  <div class="kirim-bar"><button id="kirim" disabled>KIRIM</button></div>
</div>

<input type="file" id="fImg" accept="image/*,video/*" hidden>
<input type="file" id="fMus" accept="audio/*" hidden>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./assets/js/supabase-client.js"></script>
<script>
const myId = localStorage.puu_id || (localStorage.puu_id='u_'+Math.random().toString(36).slice(2,9));
const myName = localStorage.puu_name || 'Anonim';
document.getElementById('nama').textContent = myName;
if(localStorage.puu_avatar) document.getElementById('ava').style.backgroundImage = `url(${localStorage.puu_avatar})`;

const txt = document.getElementById('txt'), kirim = document.getElementById('kirim'), prev = document.getElementById('prev'), fImg = document.getElementById('fImg');
let file = null, mentions = [];
const upd = () => kirim.disabled = !(txt.value.trim() || file);
txt.oninput = upd;

document.getElementById('toolbar').onclick = e => {
  const a = e.target.closest('.tool')?.dataset.a; if(!a) return;
  if(a==='foto') fImg.click();
  if(a==='musik') document.getElementById('fMus').click();
  if(a==='live'){ fImg.click(); }
  if(a==='lokasi') navigator.geolocation?.getCurrentPosition(p=>{ txt.value += `\n📍 ${p.coords.latitude.toFixed(4)},${p.coords.longitude.toFixed(4)} `; upd(); });
  if(a==='main'){ const g = prompt('Lagi main apa?'); if(g){ txt.value += `\n🎮 sedang bermain ${g} `; upd(); } }
  if(a==='tagar'){ const u = prompt('Tag teman (tanpa @)'); if(u){ txt.value += ` @${u.trim()} `; mentions.push(u.trim()); upd(); } }
};

fImg.onchange = e => {
  file = e.target.files[0]; if(!file) return;
  const url = URL.createObjectURL(file);
  prev.innerHTML = file.type.startsWith('video') ? `<video src="${url}" controls></video>` : `<img src="${url}">`;
  upd();
};
document.getElementById('fMus').onchange = e => { const f=e.target.files[0]; if(f) prev.innerHTML += `<p style="color:#EEC291;font-size:13px">🎵 ${f.name}</p>`; };

kirim.onclick = async () => {
  kirim.disabled = true; kirim.textContent = '...';
  try{
    let url = null;
    if(file){ const p = `posts/${Date.now()}_${file.name}`; await sb.storage.from('posts').upload(p,file); url = sb.storage.from('posts').getPublicUrl(p).data.publicUrl; }
    await sb.from('posts').insert({ user_id:myId, user:myName, text:txt.value.trim(), media_url:url, privacy:priv.value, mentions });
    location.href = 'index.html';
  }catch(err){ alert(err.message); kirim.textContent='KIRIM'; upd(); }
};
upd();
</script>
</body></html>
