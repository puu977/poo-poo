<!DOCTYPE html><html lang="id"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Postingan baru</title>
<link rel="stylesheet" href="assets/css/main.css">
<link rel="stylesheet" href="assets/css/comp-css-create.css">
</head><body>
<div class="top"><a href="index.html" class="x">×</a><b>Postingan baru</b></div>
<div id="top"></div>
<div id="media"></div>
<div id="bottom"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script>
async function load(id,file){document.getElementById(id).innerHTML=await (await fetch(file)).text();}
Promise.all([
  load('top','components/comp-post-creator-top.html'),
  load('media','components/comp-post-creator-media.html'),
  load('bottom','components/comp-post-creator-bottom.html')
]).then(()=>{
  ['comp-js-create','comp-js-chips','comp-js-media','comp-js-upload'].forEach(n=>{
    const s=document.createElement('script'); s.src=`assets/js/${n}.js`; document.body.appendChild(s);
  });
});
</script></body></html>
