<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Postingan baru</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;font-family:system-ui;background:#fff;color:#000}.top{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid #ddd;position:sticky;top:0;background:#fff;z-index:10}.x{font-size:28px;text-decoration:none;color:#000}.user{display:flex;gap:10px;padding:12px;align-items:center}.ava{width:44px;height:44px;border-radius:50%;background:#ddd;object-fit:cover}.chips{display:flex;gap:8px;padding:0 12px;overflow-x:auto}.chip{border:1px solid #ddd;border-radius:20px;padding:6px 12px;font-size:14px;white-space:nowrap;background:#f5f5f5;cursor:pointer}textarea{width:calc(100% - 24px);margin:12px;border:none;outline:none;font-size:18px;min-height:120px;resize:none}.media{margin:0 12px;position:relative}.media img,.media video{width:100%;border-radius:12px;max-height:400px;object-fit:cover}.overlay{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.6);color:#fff;padding:6px 10px;border-radius:6px;font-size:13px;cursor:pointer}.tools{position:absolute;top:8px;right:8px;display:flex;gap:8px}.tools button{width:32px;height:32px;border-radius:50%;border:none;background:rgba(0,0,0,.6);color:#fff}.bottom{display:flex;justify-content:space-between;padding:12px;border-top:1px solid #ddd;position:fixed;bottom:0;left:0;right:0;background:#fff}.btns{display:flex;gap:16px}.btns button{background:none;border:none;font-size:22px}.kirim{background:#1877f2;color:#fff;border:none;padding:8px 18px;border-radius:6px;font-weight:600}.kirim:disabled{background:#ccc}</style></head><body>
<div class="top"><a href="index.html" class="x">×</a><b>Postingan baru</b><div></div></div>
<div class="user"><img id="ava" class="ava" src="https://i.pravatar.cc/100"><div><b id="name">User</b><div id="meta" style="font-size:13px;color:#666"></div></div></div>
<div class="chips" id="chips"></div>
<textarea id="txt" placeholder="Apa yang Anda pikirkan?"></textarea>
<div class="media" id="mediaBox" style="display:none"></div>
<input type="file" id="fImg" accept="image/*,video/*" hidden>
<input type="file" id="fMus" accept="audio/*" hidden>
<div class="bottom"><div class="btns"><button onclick="fImg.click()">🖼️</button><button onclick="fMus.click()">🎵</button><button onclick="getLoc()">📍</button><button onclick="tag()">👤</button></div><button id="send" class="kirim" disabled>Kirim</button></div>
<script src="assets/js/supabase.js"></script>
<script>
let user=localStorage.pid||'User'+Math.floor(Math.random()*900);localStorage.pid=user;document.getElementById('name').textContent=user;
let data={text:'',media:null,music:null,loc:'',feeling:'',tags:[]};
const txt=document.getElementById('txt'),send=document.getElementById('send'),mediaBox=document.getElementById('mediaBox'),chips=document.getElementById('chips');
function renderChips(){chips.innerHTML=`<div class="chip" onclick="fMus.click()">🎵 Musik${data.music?'✓':''}</div><div class="chip" onclick="tag()">👤 Orang${data.tags.length?'✓':''}</div><div class="chip" onclick="getLoc()">📍 Lokasi${data.loc?'✓':''}</div><div class="chip" onclick="feel()">🙂 Perasaan${data.feeling?'✓':''}</div>`}
renderChips();
txt.oninput=()=>{data.text=txt.value;send.disabled=!data.text.trim()&&!data.media};
fImg.onchange=e=>{const f=e.target.files[0];if(!f)return;data.media=f;const url=URL.createObjectURL(f);mediaBox.style.display='block';mediaBox.innerHTML=`${f.type.startsWith('video')?`<video src="${url}" controls></video>`:`<img src="${url}">`}<div class="overlay" onclick="fImg.click()">+ Tambahkan media</div><div class="tools"><button onclick="fImg.click()">✏️</button><button onclick="delMedia()">🗑️</button></div>`;send.disabled=false};
fMus.onchange=e=>{data.music=e.target.files[0];renderChips()};
function delMedia(){data.media=null;mediaBox.style.display='none';mediaBox.innerHTML='';send.disabled=!data.text.trim()};
function getLoc(){navigator.geolocation.getCurrentPosition(p=>{data.loc=`${p.coords.latitude.toFixed(4)},${p.coords.longitude.toFixed(4)}`;document.getElementById('meta').textContent=data.loc;renderChips()},()=>alert('Izin lokasi ditolak'))}
function tag(){const t=prompt('Tag orang (pisah koma):');if(t)data.tags=t.split(',');renderChips()}
function feel(){const f=prompt('Perasaan:');if(f){data.feeling=f;document.getElementById('meta').textContent=f;renderChips()}}
send.onclick=async()=>{send.disabled=true;send.textContent='Mengirim...';let mediaUrl=null,musicUrl=null;if(data.media){const {data:up}=await sb.storage.from('posts').upload(`media/${Date.now()}_${data.media.name}`,data.media);mediaUrl=sb.storage.from('posts').getPublicUrl(up.path).data.publicUrl}if(data.music){const {data:up}=await sb.storage.from('posts').upload(`music/${Date.now()}_${data.music.name}`,data.music);musicUrl=sb.storage.from('posts').getPublicUrl(up.path).data.publicUrl}await sb.from('posts').insert({user,text:data.text,media_url:mediaUrl,music_url:musicUrl,location:data.loc,feeling:data.feeling,tags:data.tags});location='index.html'};
</script></body></html>
