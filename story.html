<!DOCTYPE html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Story</title>
<style>body{margin:0;background:#000;color:#fff;font-family:system-ui;height:100dvh;display:flex;flex-direction:column;justify-content:center;align-items:center} video,img{max-width:100%;max-height:70vh;object-fit:contain}.top{position:absolute;top:0;left:0;right:0;padding:14px;display:flex;justify-content:space-between} a{color:#fff;font-size:28px;text-decoration:none} button{position:absolute;bottom:30px;background:#EEC291;color:#000;border:none;padding:12px 30px;border-radius:30px;font-weight:700}</style></head><body>
<div class="top"><a href="index.html">×</a><span>Story (24 jam)</span></div>
<input type="file" id="f" accept="image/*,video/*" capture="environment" hidden>
<div id="p" onclick="f.click()" style="text-align:center;color:#888">Tap untuk pilih foto/video</div>
<button id="k" style="display:none">BAGIKAN</button>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./assets/js/supabase-client.js"></script>
<script>
const id=localStorage.puu_id, name=localStorage.puu_name||'Anonim';
const f=document.getElementById('f'),p=document.getElementById('p'),k=document.getElementById('k'); let file;
f.onchange=e=>{file=e.target.files[0]; const u=URL.createObjectURL(file); p.innerHTML=file.type.startsWith('video')?`<video src="${u}" autoplay muted loop></video>`:`<img src="${u}">`; k.style.display='block'};
k.onclick=async()=>{k.disabled=true; const pa=`stories/${Date.now()}_${file.name}`; await sb.storage.from('posts').upload(pa,file); const url=sb.storage.from('posts').getPublicUrl(pa).data.publicUrl; const exp=new Date(Date.now()+24*60*60*1000).toISOString(); await sb.from('posts').insert({user_id:id,username:name,media_url:url,type:'story',expires_at:exp}); location='index.html'};
f.click();
</script></body></html>
