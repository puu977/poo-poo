<script>
(async ()=>{
  if(await checkAlreadyLoggedIn()){
    window.location.href = "home.html";
    return;
  }

  document.getElementById('regForm').addEventListener('submit', async e=>{
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;

    if(password.length < 6){
      showToast('Password minimal 6 karakter');
      return;
    }

    if(password !== password2){
      showToast('Password tidak cocok');
      return;
    }

    if(!sb){
      showToast('Supabase belum dikonfigurasi');
      return;
    }

    const btn = document.getElementById('regBtn');

    setLoading(btn, true, 'Mendaftar…');

    const { data, error } = await sb.auth.signUp({
      email,
      password,
      options: {
        emailRedirectTo: window.location.origin + "/home.html"
      }
    });

    setLoading(btn, false);

    if(error){
      showToast(authError(error));
      return;
    }

    showToast('Cek email untuk verifikasi');

    setTimeout(()=>{
      window.location.href = "login.html";
    }, 1200);
  });
})();
</script>
