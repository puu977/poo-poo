<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lengkapi Profil – Puu Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
.banner-wrap{position:relative;margin:-8px -2px 52px -2px}
.banner-img{width:100%;height:130px;object-fit:cover;border-radius:16px;background:linear-gradient(135deg,#332F54,#49426E);cursor:pointer;display:block}
.avatar-over{position:absolute;left:22px;bottom:-34px;width:84px;height:84px;border-radius:50%;border:4px solid #49426E;object-fit:cover;background:#3F3b62;cursor:pointer}
.banner-hint{font-size:11.5px;color:#9b87b9;text-align:center;margin-top:4px}
</style>
</head>
<body class="auth-body">
  <div class="auth-card" style="max-width:440px">
    <div class="auth-logo">Puu <span>Chat</span></div>
    <div class="auth-title">Lengkapi profilmu</div>
    <div class="auth-sub">Banner + foto, seperti Facebook</div>

    <form id="profileForm">
      <div class="banner-wrap">
        <img id="bannerPreview" class="banner-img" src="" alt="banner">
        <img id="avatarPreview" class="avatar-over" src="https://i.pravatar.cc/90" alt="avatar">
        <input type="file" id="bannerFile" accept="image/*" hidden>
        <input type="file" id="avatarFile" accept="image/*" hidden>
      </div>
      <div class="banner-hint">Tap banner / foto untuk ganti</div>

      <div class="auth-field" style="margin-top:14px"><label>Username</label>
        <input class="auth-input" type="text" id="username" placeholder="puu_nano" required pattern="[a-z0-9_]{3,20}">
      </div>
      <div class="auth-field"><label>Nama tampilan</label>
        <input class="auth-input" type="text" id="display_name" placeholder="Johari Nano">
      </div>
      <div class="auth-field"><label>Bio</label>
        <input class="auth-input" type="text" id="bio" placeholder="Hai, aku di Puu Chat!">
      </div>

      <button class="btn-auth" id="saveBtn" type="submit">Simpan & Lanjut ke Beranda</button>
    </form>
    <div class="auth-foot"><a href="#" id="skipLink">Lewati dulu</a></div>
  </div>

  <div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://YOUR-PROJECT.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const BLANK_AVATAR = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iODAiIHZpZXdCb3g9IjAgMCA4MCA4MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSI0MCIgY3k9IjQwIiByPSI0MCIgZmlsbD0iIzNGM2I2MiIvPjxjaXJjbGUgY3g9IjQwIiBjeT0iMzIiIHI9IjEyIiBmaWxsPSIjNTQ0RjdFIi8+PHBhdGggZD0iTTIwIDYyQzIwIDUwIDI4IDQ4IDQwIDQ4UzYwIDUwIDYwIDYyIiBmaWxsPSIjNTQ0RjdFIi8+PC9zdmc+';

function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),2200) }

let user=null;
(async ()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session){ location.replace('login.html'); return }
  user = session.user;
})();

document.getElementById('bannerPreview').onclick = ()=> document.getElementById('bannerFile').click();
document.getElementById('avatarPreview').onclick = ()=> document.getElementById('avatarFile').click();
document.getElementById('bannerFile').addEventListener('change', e=>{
  const f=e.target.files[0]; if(f) document.getElementById('bannerPreview').src = URL.createObjectURL(f);
});
document.getElementById('avatarFile').addEventListener('change', e=>{
  const f=e.target.files[0]; if(f) document.getElementById('avatarPreview').src = URL.createObjectURL(f);
});

document.getElementById('profileForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const username = document.getElementById('username').value.trim().toLowerCase();
  const display_name = document.getElementById('display_name').value.trim();
  const bio = document.getElementById('bio').value.trim();
  const avatarF = document.getElementById('avatarFile').files[0];
  const bannerF = document.getElementById('bannerFile').files[0];
  const btn = document.getElementById('saveBtn'); btn.disabled=true; btn.textContent='Menyimpan…';

  let avatar_url=null, banner_url=null;
  try {
    if(avatarF){ const p=`${user.id}/avatar.jpg`; await sb.storage.from('avatars').upload(p, avatarF, {upsert:true}); avatar_url = sb.storage.from('avatars').getPublicUrl(p).data.publicUrl; }
    if(bannerF){ const p=`${user.id}/banner.jpg`; await sb.storage.from('avatars').upload(p, bannerF, {upsert:true}); banner_url = sb.storage.from('avatars').getPublicUrl(p).data.publicUrl; }
    await sb.from('profiles').upsert({ id:user.id, username, display_name, bio, avatar_url, banner_url, updated_at: new Date().toISOString() });
  } catch(e){ localStorage.setItem('puu_profile', JSON.stringify({username, display_name, bio})); }

  btn.disabled=false; btn.textContent='Simpan & Lanjut ke Beranda';
  toast('Profil tersimpan'); setTimeout(()=> location.replace('home.html'), 600);
});
document.getElementById('skipLink').onclick = e=>{ e.preventDefault(); location.replace('home.html') };
</script>
</body>
</html>
