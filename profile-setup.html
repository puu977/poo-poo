<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lengkapi Profil – Puu Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
.banner-wrap{position:relative;margin:-8px -2px 52px -2px}
.banner-img{width:100%;height:130px;object-fit:cover;border-radius:16px;background:linear-gradient(135deg,#332F54,#49426E);cursor:pointer;display:block}
.avatar-over{position:absolute;left:22px;bottom:-34px;width:84px;height:84px;border-radius:50%;border:4px solid #49426E;object-fit:cover;background:#3F3b62;cursor:pointer}
.banner-hint{font-size:11.5px;color:#9b87b9;text-align:center;margin-top:4px}
.name-preview{text-align:center;margin-top:6px;color:#E2D3F4;font-weight:600;font-size:14px;min-height:20px}
.name-preview span{color:#9b87b9;font-weight:400;font-size:12px}
</style>
</head>
<body class="auth-body">
  <div class="auth-card" style="max-width:440px">
    <div class="auth-logo">Puu <span>Chat</span></div>
    <div class="auth-title">Lengkapi profilmu</div>
    <div class="auth-sub">Banner + foto, seperti Facebook</div>

    <form id="profileForm">
      <div class="banner-wrap">
        <img id="bannerPreview" class="banner-img" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAwIiBoZWlnaHQ9IjEzMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48L3N2Zz4=" alt="banner">
        <img id="avatarPreview" class="avatar-over" src="" alt="avatar">
        <input type="file" id="bannerFile" accept="image/*" hidden>
        <input type="file" id="avatarFile" accept="image/*" hidden>
      </div>
      <div class="banner-hint">Tap banner / foto untuk ganti</div>
      <div class="name-preview" id="namePreview">user_000000<br><span>ID acak</span></div>

      <div class="auth-field" style="margin-top:14px"><label>Username</label>
        <input class="auth-input" type="text" id="username" placeholder="kosongkan untuk pakai ID acak" pattern="[a-z0-9_]{3,20}">
      </div>
      <div class="auth-field"><label>Nama tampilan</label>
        <input class="auth-input" type="text" id="display_name" placeholder="kosongkan untuk pakai ID">
      </div>
      <div class="auth-field"><label>Bio</label>
        <input class="auth-input" type="text" id="bio" placeholder="Hai, aku di Puu Chat!">
      </div>

      <button class="btn-auth" id="saveBtn" type="submit">Simpan & Lanjut ke Beranda</button>
    </form>
    <div class="auth-foot"><a href="#" id="skipLink">Lewati dulu</a></div>
  </div>

  <div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// <-- ISI KEY KAMU
const SUPABASE_URL = "https://gttedpjwqgiyszmrcnoe.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0dGVkcGp3cWdpeXN6bXJjbm9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjk3MjIsImV4cCI6MjA5Njk0NTcyMn0.GzouEkyd6pRvT_IQuNR7LTyN6ewPiCTj2Xqu8l9yEcY";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const BLANK_AVATAR = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iODAiIHZpZXdCb3g9IjAgMCA4MCA4MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSI0MCIgY3k9IjQwIiByPSI0MCIgZmlsbD0iIzNGM2I2MiIvPjxjaXJjbGUgY3g9IjQwIiBjeT0iMzIiIHI9IjEyIiBmaWxsPSIjNTQ0RjdFIi8+PHBhdGggZD0iTTIwIDYyQzIwIDUwIDI4IDQ4IDQwIDQ4UzYwIDUwIDYwIDYyIiBmaWxsPSIjNTQ0RjdFIi8+PC9zdmc+';

function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),2200) }

let user=null;
let randomId = 'user_' + Math.floor(Math.random()*900000 + 100000);

document.getElementById('avatarPreview').src = BLANK_AVATAR;

function updatePreview(){
  const u = document.getElementById('username').value.trim() || '';
  const d = document.getElementById('display_name').value.trim() || '';
  const name = d || u || randomId;
  const sub = d && u? '@' + u : (!d &&!u? 'ID acak' : 'ID');
  document.getElementById('namePreview').innerHTML = name + '<br><span>' + sub + '</span>';
}
updatePreview();
document.getElementById('username').addEventListener('input', updatePreview);
document.getElementById('display_name').addEventListener('input', updatePreview);

(async ()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session){ location.replace('login.html'); return }
  user = session.user;
  // kalau user_id pendek, pakai itu sebagai fallback id, biar konsisten
  const shortUid = 'user_' + user.id.slice(0,6);
  randomId = shortUid;
  updatePreview();
})();

document.getElementById('bannerPreview').onclick = ()=> document.getElementById('bannerFile').click();
document.getElementById('avatarPreview').onclick = ()=> document.getElementById('avatarFile').click();
document.getElementById('bannerFile').addEventListener('change', e=>{
  const f=e.target.files[0]; if(f) document.getElementById('bannerPreview').src = URL.createObjectURL(f);
});
document.getElementById('avatarFile').addEventListener('change', e=>{
  const f=e.target.files[0]; if(f) document.getElementById('avatarPreview').src = URL.createObjectURL(f);
});

async function saveProfile(isSkip = false){
  const usernameInput = document.getElementById('username').value.trim().toLowerCase();
  const displayInput = document.getElementById('display_name').value.trim();
  const bio = document.getElementById('bio').value.trim();
  const avatarF = document.getElementById('avatarFile').files[0];
  const bannerF = document.getElementById('bannerFile').files[0];

  const username = usernameInput || randomId;
  const display_name = displayInput || username;

  let avatar_url = null, banner_url = null;
  try {
    if(avatarF){ const p=`${user.id}/avatar.jpg`; await sb.storage.from('avatars').upload(p, avatarF, {upsert:true}); avatar_url = sb.storage.from('avatars').getPublicUrl(p).data.publicUrl; }
    if(bannerF){ const p=`${user.id}/banner.jpg`; await sb.storage.from('avatars').upload(p, bannerF, {upsert:true}); banner_url = sb.storage.from('avatars').getPublicUrl(p).data.publicUrl; }
    await sb.from('profiles').upsert({ id:user.id, username, display_name, bio: bio || null, avatar_url, banner_url, updated_at: new Date().toISOString() });
  } catch(e){
    localStorage.setItem('puu_profile', JSON.stringify({username, display_name, bio}));
  }
  return {username, display_name};
}

document.getElementById('profileForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const btn = document.getElementById('saveBtn'); btn.disabled=true; btn.textContent='Menyimpan…';
  await saveProfile(false);
  btn.disabled=false; btn.textContent='Simpan & Lanjut ke Beranda';
  toast('Profil tersimpan'); setTimeout(()=> location.replace('home.html'), 600);
});

document.getElementById('skipLink').onclick = async e=>{
  e.preventDefault();
  if(!user) { location.replace('home.html'); return }
  await saveProfile(true);
  location.replace('home.html');
};
</script>
</body>
</html>
