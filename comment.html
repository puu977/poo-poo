<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CSS KAMU DI SINI -->
<link rel="stylesheet" href="style.css">

<title>Thread Komentar</title>
</head>

<body>

<div class="post">

    <!-- KOMENTAR UTAMA -->
    <div class="comment">
        <img class="avatar" src="https://i.pravatar.cc/100?img=10">

        <div class="content">
            <div class="name">Jendhil AI Bantaly</div>
            <div class="text">
                Marcel udah bijak. Itu mutlak seni budaya karena ada musik dan tariannya.
            </div>

            <div class="actions">
                <a href="#" class="like-btn">Suka</a>
                <a href="#" class="reply-btn">Balas</a>
            </div>

            <div class="reaction">👍 <span class="count">37</span></div>
        </div>
    </div>


    <!-- REPLY 1 -->
    <div class="comment reply">
        <img class="avatar" src="https://i.pravatar.cc/100?img=22">

        <div class="content">
            <div class="name">Rizki Wiliyanda</div>
            <div class="text">
                Tapi banyak yang percaya itu kesurupan gimana dong 😂
            </div>

            <div class="actions">
                <a href="#" class="like-btn">Suka</a>
                <a href="#" class="reply-btn">Balas</a>
            </div>

            <div class="reaction">👍 <span class="count">5</span></div>
        </div>
    </div>


    <!-- REPLY DENGAN GAMBAR -->
    <div class="comment reply">
        <img class="avatar" src="https://i.pravatar.cc/100?img=30">

        <div class="content">
            <div class="name">Admin</div>

            <div class="text">
                Ini contoh balasan pakai gambar:
            </div>

            <img class="comment-img" src="https://picsum.photos/300/180">

            <div class="actions">
                <a href="#" class="like-btn">Suka</a>
                <a href="#" class="reply-btn">Balas</a>
            </div>

            <div class="reaction">👍 <span class="count">12</span></div>
        </div>
    </div>


    <!-- INPUT KOMENTAR -->
    <div class="comment-box">
        <input type="text" placeholder="Tulis komentar...">
        <button>Kirim</button>
    </div>

</div>

</body>
</html>
