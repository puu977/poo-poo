<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Komentar</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Poppins,sans-serif;background:#fff;color:#000}
.top{position:sticky;top:0;background:#fff;padding:12px 16px;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center;z-index:10}
.likes{font-weight:600;display:flex;align-items:center;gap:6px}.sort{font-weight:600;cursor:pointer}
.wrap{padding:0 16px;max-width:680px;margin:0 auto}
.cmt{display:flex;gap:8px;padding:12px 0;border-bottom:1px solid #f0f0f0}.cmt img{width:36px;height:36px;border-radius:50%}.name{font-weight:600;font-size:14px}.txt{font-size:14px;line-height:1.4;margin:2px 0;white-space:pre-wrap}.time{font-size:12px;color:#65676b}.actions{display:flex;gap:16px;margin-top:6px}.actions span{font-size:12px;color:#65676b;font-weight:600;cursor:pointer}.react{margin-left:auto;display:flex;gap:10px}.react button{background:none;border:none;font-size:16px;opacity:.7;cursor:pointer}
.media{margin-top:8px;position:relative;display:inline-block}.media img,.media video{max-width:280px;max-height:200px;border-radius:8px}.dl{position:absolute;top:6px;right:6px;width:26px;height:26px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;display:grid;place-items:center;font-size:14px;cursor:pointer}
.composer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ddd;padding:10px;max-width:680px;margin:0 auto}.box{background:#f0f2f5;border-radius:18px;padding:8px 12px}.as{font-size:12px;color:#65676b;margin-bottom:4px}textarea{width:100%;background:none;border:none;outline:none;resize:none;font-size:15px;min-height:20px;max-height:100px;font-family:inherit}.tools{display:flex;gap:12px;margin-top:6px;align-items:center}.tools button{background:none;border:none;font-size:22px;opacity:.7;cursor:pointer}.send{margin-left:auto;color:#1877f2;font-size:22px}
.preview{margin-top:6px;position:relative;display:inline-block}.preview img,.preview video{max-width:150px;max-height:120px;border-radius:8px}.preview.x{position:absolute;top:-6px;right:-6px;width:20px;height:20px;background:#000;color:#fff;border:none;border-radius:50%;font-size:12px;cursor:pointer}
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:20}.sheet-bg.show{display:block}.sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:16px 16px 0 0;padding:20px;transform:translateY(100%);transition:.25s;z-index:21;max-width:680px;margin:0 auto}.sheet.show{transform:translateY(0)}.sheet-title{text-align:center;color:#65676b;font-size:14px;margin-bottom:16px}.item{display:flex;align-items:center;gap:16px;padding:14px;border-radius:8px;cursor:pointer}.item:hover{background:#f5f5f5}.item svg{width:22px;height:22px}
.back{position:fixed;top:12px;left:12px;width:36px;height:36px;background:#fff;border-radius:50%;display:grid;place-items:center;box-shadow:0 1px 3px rgba(0,0,0,.2);z-index:11;cursor:pointer;font-size:20px}
</style>
</head>
<body>
<div class="back" onclick="history.back()">←</div>
<div class="top">
  <div class="likes">👍😂 <span id="lc">228</span></div>
  <div class="sort">Paling relevan ▼</div>
</div>
<div class="wrap" id="list" style="padding-bottom:120px"></div>

<div class="composer">
  <div class="box">
    <div class="as" id="as">Komentari sebagai User</div>
    <textarea id="in" placeholder="Tulis komentar..." rows="1"></textarea>
    <div id="pv"></div>
    <div class="tools">
      <button onclick="document.getElementById('f').click()">📷</button>
      <button onclick="document.getElementById('f').click()">➕</button>
      <button class="send" onclick="send()">➤</button>
    </div>
  </div>
  <input type="file" id="f" hidden accept="image/*,video/*">
</div>

<div class="sheet-bg" id="bg" onclick="closeS()"></div>
<div class="sheet" id="sh">
  <div class="sheet-title">Tanggapi komentar ini</div>
  <div class="item" onclick="act('reply')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Balas</span></div>
  <div class="item" onclick="act('copy')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span>Salin</span></div>
  <div class="item" onclick="act('del')"><svg viewBox="0 0 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg><span>Hapus</span></div>
  <div class="item" onclick="act('edit')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg><span>Edit</span></div>
</div>

<script>
const idx=parseInt(localStorage.puu_cur||'0')
let posts=JSON.parse(localStorage.puu_posts||'[]')
let p=posts[idx]||{c:[]}
const me=localStorage.puu_name||localStorage.puu_id||'User'
document.getElementById('as').textContent='Komentari sebagai '+me
document.getElementById('lc').textContent=(p.l||0)+Math.floor(Math.random()*50)

let curIdx=null,cm=null,cmt=null
function tm(t){const d=Date.now()-t,m=d/60000|0;if(m<1)return'Baru saja';if(m<60)return m+' menit';return Math.floor(m/60)+' jam'}

function render(){const el=document.getElementById('list');if(!p.c.length){el.innerHTML='<div style="text-align:center;color:#999;padding:40px">Belum ada komentar</div>';return}el.innerHTML=p.c.map((c,i)=>`<div class="cmt" oncontextmenu="e=event;e.preventDefault();openS(${i})" ontouchstart="ts(${i})" ontouchend="te()"><img src="assets/img/avatar-blank.png"><div style="flex:1"><div class="name">${c.n}</div><div class="txt">${c.x.replace(/</g,'&lt;')}</div>${c.m?`<div class="media">${c.mt==='video'?`<video src="${c.m}" controls></video>`:`<img src="${c.m}">`}<button class="dl" onclick="dl('${c.m}')">⬇</button></div>`:''}<div class="time">${tm(c.t)}</div><div class="actions"><span onclick="reply(${i})">Balas</span><div class="react"><button>👍</button><button>👎</button></div></div>`).join('')}
render()

let tt;function ts(i){tt=setTimeout(()=>openS(i),600)}function te(){clearTimeout(tt)}
function openS(i){curIdx=i;document.getElementById('bg').classList.add('show');document.getElementById('sh').classList.add('show')}
function closeS(){document.getElementById('bg').classList.remove('show');document.getElementById('sh').classList.remove('show')}
function act(a){closeS();const c=p.c[curIdx];if(a==='reply')reply(curIdx);else if(a==='copy'){navigator.clipboard.writeText(c.x);alert('Disalin')}else if(a==='del'){if(confirm('Hapus?')){p.c.splice(curIdx,1);save();render()}}else if(a==='edit'){const t=prompt('Edit:',c.x);if(t!=null){c.x=t;save();render()}}}
function reply(i){document.getElementById('in').value='@'+p.c[i].n+' ';document.getElementById('in').focus()}

document.getElementById('f').onchange=e=>{const f=e.target.files[0];if(!f)return;cm=URL.createObjectURL(f);cmt=f.type.startsWith('video')?'video':'image';document.getElementById('pv').innerHTML=`<div class="preview">${cmt==='video'?`<video src="${cm}" controls></video>`:`<img src="${cm}">`}<button class="x" onclick="cl()">×</button></div>`;e.target.value=''}
function cl(){cm=null;cmt=null;document.getElementById('pv').innerHTML=''}
function dl(u){const a=document.createElement('a');a.href=u;a.download='puu-'+Date.now();a.click()}
function send(){const t=document.getElementById('in').value.trim();if(!t&&!cm)return;p.c.push({n:me,x:t,t:Date.now(),m:cm,mt:cmt});document.getElementById('in').value='';cl();save();render();document.getElementById('lc').textContent=parseInt(document.getElementById('lc').textContent)+1}
function save(){posts[idx]=p;localStorage.puu_posts=JSON.stringify(posts)}
document.getElementById('in').addEventListener('input',function(){this.style.height='auto';this.style.height=this.scrollHeight+'px'})
</script>
</body>
</html>
