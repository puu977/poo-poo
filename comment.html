<!DOCTYPE html><html lang="id"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Komentar</title>
<link rel="stylesheet" href="./assets/css/main.css">
<style>
body{background:#332F54}
.header{position:sticky;top:0;background:#49426E;padding:14px 16px;display:flex;align-items:center;gap:12px}
.header h3{color:#E2D3F4;margin:0}
.wrap{padding:12px 12px 90px;max-width:700px;margin:0 auto}
.comment{background:#3F3B62;border-radius:12px;padding:12px;margin-bottom:10px}
.name{color:#EEC291;font-weight:600}.time{color:#9386a2;font-size:11px;float:right}
.text{color:#DDD9D0;margin:6px 0;white-space:pre-wrap}
.act{display:flex;gap:14px;margin-top:6px}.act span{color:#b8a9d4;font-size:13px;cursor:pointer}
.reply-wrap{margin-left:18px;border-left:2px solid #4a446b;padding-left:10px;margin-top:8px}
.file{display:block;margin-top:6px}.file img{max-width:200px;border-radius:8px}.file a{color:#EEC291;font-size:13px}
.input-bar{position:fixed;bottom:0;left:0;right:0;background:#49426E;padding:8px;display:flex;align-items:center;gap:6px}
.input-wrap{flex:1;background:#3F3B62;border-radius:24px;display:flex;align-items:center;padding:0 8px}
.input-wrap input{flex:1;background:transparent;border:none;padding:12px 6px;color:#E2D3F4;font-size:14px;outline:none}
.icon{font-size:22px;padding:6px;color:#b8a9d4;cursor:pointer}
.send{background:#EEC291;color:#332F54;border:none;border-radius:20px;padding:10px 18px;font-weight:700}
.send:disabled{opacity:.5}
.sticker{position:fixed;bottom:60px;left:10px;right:10px;background:#3F3B62;border-radius:12px;padding:10px;display:none;grid-template-columns:repeat(8,1fr);gap:8px;max-height:180px;overflow:auto}
.sticker span{font-size:24px;text-align:center;cursor:pointer}
</style>
</head><body>
<div class="header"><a href="index.html" style="color:#E2D3F4">←</a><h3>Komentar</h3></div>
<div class="wrap" id="list"></div>

<div class="sticker" id="stik"></div>
<div class="input-bar">
  <div class="input-wrap">
    <span class="icon" onclick="toggleStik()">😊</span>
    <input id="txt" placeholder="Tulis komentar...">
    <span class="icon" onclick="document.getElementById('file').click()">📎</span>
    <input type="file" id="file" hidden accept="image/*,.zip,.rar,.pdf,.txt,.mp4">
  </div>
  <button class="send" id="send">Kirim</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./assets/js/supabase-client.js"></script>
<script>
const params=new URLSearchParams(location.search);const postId=params.get('id');
if(!postId)location.href='index.html';
if(!localStorage.puu_name)localStorage.puu_name='Anonim'+Math.floor(Math.random()*999);
const me=localStorage.puu_name;let replyTo=null;const liked=JSON.parse(localStorage.liked_c||'{}');
const stik=['😂','😭','❤️','🔥','👍','🙏','😍','🥲','🤣','😎','💀','🗿','😁','🥳','😅','🤔','🙄','😡','👀','✨','💯','🙌','🤝','🎉','😴','🤤','🤡','😇','🥺','😱','👌','💔'];
document.getElementById('stik').innerHTML=stik.map(s=>`<span onclick="addStik('${s}')">${s}</span>`).join('');
function toggleStik(){const e=document.getElementById('stik');e.style.display=e.style.display==='grid'?'none':'grid'}
function addStik(s){document.getElementById('txt').value+=s;toggleStik()}

async function load(){
  const {data}=await sb.from('comments').select('*').eq('post_id',postId).order('created_at',{ascending:true});
  document.getElementById('list').innerHTML=build(data,null).join('')||'<p style="color:#9386a2;text-align:center;margin-top:40px">Belum ada komentar</p>';
}
function build(all,parent){
  return all.filter(c=>c.parent_id===parent).map(c=>{
    const t=new Date(c.created_at).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
    const isL=!!liked[c.id];const mine=c.username===me;const kids=build(all,c.id);
    let file='';if(c.file_url){file=c.file_type?.startsWith('image')?`<a class="file" href="${c.file_url}" target="_blank"><img src="${c.file_url}"></a>`:`<a class="file" href="${c.file_url}" target="_blank">📦 ${c.file_type||'file'}</a>`}
    return `<div class="comment"><div><span class="name">@${c.username}</span><span class="time">${t}${c.edited?' • edited':''}</span></div><div class="text">${(c.text||'').replace(/</g,'&lt;')}</div>${file}<div class="act"><span onclick="likeC(${c.id},this)" data-l="${c.likes||0}" class="${isL?'':' '}" style="color:${isL?'#ff6b81':'#b8a9d4'}">${isL?'❤️':'🤍'} ${c.likes||0}</span><span onclick="balas(${c.id},'${c.username}')">↩️ Balas</span>${mine?`<span onclick="editC(${c.id})">✏️ Edit</span><span onclick="hapusC(${c.id})" style="color:#ff7b7b">🗑️ Hapus</span>`:''}</div><div id="e${c.id}"></div>${kids.length?`<div class="reply-wrap">${kids.join('')}</div>`:''}</div>`;
  });
}
async function likeC(id,el){const l=!!liked[id];let n=+el.dataset.l||0;n=l?n-1:n+1;liked[id]=!l;localStorage.liked_c=JSON.stringify(liked);el.dataset.l=n;el.innerHTML=`${!l?'❤️':'🤍'} ${n}`;el.style.color=!l?'#ff6b81':'#b8a9d4';await sb.from('comments').update({likes:n}).eq('id',id)}
function balas(id,name){replyTo=id;document.getElementById('txt').placeholder=`Balas @${name}...`;document.getElementById('txt').focus()}
async function editC(id){const t=prompt('Edit komentar:');if(!t)return;await sb.from('comments').update({text:t,edited:true}).eq('id',id);load()}
async function hapusC(id){if(!confirm('Hapus?'))return;await sb.from('comments').delete().eq('id',id);load()}

document.getElementById('send').onclick=async()=>{
  const btn=document.getElementById('send'),inp=document.getElementById('txt'),f=document.getElementById('file').files[0];
  const text=inp.value.trim();if(!text &&!f)return;
  btn.disabled=true;btn.textContent='...';let url=null,type=null;
  if(f){const path=`${Date.now()}_${f.name}`;const up=await sb.storage.from('comment-files').upload(path,f);if(up.error){alert(up.error.message);btn.disabled=false;btn.textContent='Kirim';return}url=sb.storage.from('comment-files').getPublicUrl(path).data.publicUrl;type=f.type||'file'}
  const {error}=await sb.from('comments').insert({post_id:postId,parent_id:replyTo,text,username:me,file_url:url,file_type:type});
  btn.disabled=false;btn.textContent='Kirim';if(error){alert(error.message)}else{inp.value='';document.getElementById('file').value='';replyTo=null;inp.placeholder='Tulis komentar...';load()}
};
load();setInterval(load,4000);
</script></body></html>
