<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server – Puu Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
:root{--puu:#49426E;--puu2:#332F54;--gold:#EEC291;--txt:#E2D3F4;--muted:#9b87b9}
body{background:var(--puu);color:var(--txt);font-family:'Poppins',sans-serif;margin:0}
.srv-wrap{display:flex;flex:1;min-width:0;height:calc(100vh - 64px);overflow:hidden}
/* server rail */
.srv-rail{width:72px;background:#2a2648;display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:10px;flex-shrink:0}
.srv-icon{width:48px;height:48px;border-radius:50%;background:#3F3b62;display:flex;align-items:center;justify-content:center;color:var(--txt);font-weight:700;font-size:13px;cursor:pointer;border:2px solid transparent;object-fit:cover}
.srv-icon.active{border-color:var(--gold);border-radius:16px}
.srv-add{width:48px;height:48px;border-radius:50%;background:#332F54;color:#7ed6a8;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;border:1px dashed #544F7E}
/* channel list */
.ch-list{width:260px;background:var(--puu2);display:flex;flex-direction:column;border-right:1px solid var(--puu);flex-shrink:0;min-width:0}
.ch-head{padding:14px;color:var(--txt);font-weight:700;border-bottom:1px solid var(--puu);display:flex;justify-content:space-between;align-items:center}
.ch-group{padding:10px 12px;color:var(--muted);font-size:11.5px;text-transform:uppercase}
.ch-item{padding:7px 14px;color:#b9a9d3;font-size:13.5px;cursor:pointer;border-radius:6px;margin:0 8px}
.ch-item:hover,.ch-item.active{background:var(--puu);color:var(--txt)}
/* chat */
.chat{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--puu)}
.chat-head{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--puu2);border-bottom:1px solid var(--puu)}
.chat-head b{color:var(--txt)}
.chat-head span{color:var(--muted);font-size:12px}
.icon-btn{background:#49426E;border:1px solid #544F7E;color:var(--txt);border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;text-decoration:none}
.icon-btn.primary{background:var(--gold);color:#332F54;border-color:var(--gold);font-weight:700}
.msg-area{flex:1;overflow-y:auto;padding:16px}
.msg{display:flex;gap:10px;margin-bottom:14px}
.msg img{width:34px;height:34px;border-radius:50%;border:2px solid #544F7E;background:#3F3b62;object-fit:cover}
.msg-bubble{max-width:70%;background:#332F54;border-radius:14px;padding:8px 12px}
.msg-bubble h4{margin:0 0 2px 0;font-size:12.5px;color:var(--gold)}
.msg-bubble p{margin:0;color:#DDD9D0;font-size:13.5px;white-space:pre-wrap}
.composer{display:flex;gap:8px;padding:12px 14px;background:#332F54;border-top:1px solid var(--puu);align-items:center}
.composer input{flex:1;background:#49426E;border:1px solid #544F7E;border-radius:999px;padding:10px 14px;color:var(--txt);font-size:14px;font-family:'Poppins',sans-serif}
.composer input::placeholder{color:var(--muted)}
.composer button{background:var(--gold);color:#332F54;border:none;border-radius:999px;padding:9px 16px;font-weight:700;cursor:pointer}
/* members */
.members{width:220px;background:#332F54;border-left:1px solid var(--puu);padding:12px;overflow-y:auto;display:none}
@media(min-width:1100px){.members{display:block}}
.member{display:flex;align-items:center;gap:8px;padding:6px 0;color:#b9a9d3;font-size:13px}
.member img{width:28px;height:28px;border-radius:50%;border:2px solid #544F7E;background:#3F3b62}
.role{font-size:10px;color:var(--gold);margin-left:4px}
/* empty state */
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:20px}
/* modal */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:50}
.modal-back.show{display:flex}
.modal{background:#332F54;border-radius:16px;padding:18px;width:90%;max-width:380px;color:var(--txt)}
.modal input,.modal select,.modal textarea{width:100%;box-sizing:border-box;background:#49426E;border:1px solid #544F7E;border-radius:10px;padding:10px 12px;color:var(--txt);margin-bottom:10px;font-family:'Poppins',sans-serif}
.btn-primary{background:var(--gold);color:#332F54;border:none;border-radius:10px;padding:8px 14px;font-weight:700;cursor:pointer}
.btn-ghost{background:#49426E;color:var(--txt);border:1px solid #544F7E;border-radius:10px;padding:8px 14px;cursor:pointer}
/* mobile */
@media(max-width:820px){
  .ch-list{width:100%;border-right:none}
  .ch-list.hide{display:none}
  .chat{width:100%;display:none}
  .chat.show{display:flex}
  #backBtn{display:inline-block !important}
}
#backBtn{display:none}
/* navbar back */
.nav-back{display:flex;align-items:center;gap:8px;color:#E2D3F4;text-decoration:none;font-weight:600;font-size:15px}
.nav-back:hover{color:#EEC291}
</style>
</head>
<body>
<div class="main-container">
  <div class="navbar">
    <div class="nav-left" style="gap:12px">
      <button class="toggle-btn" id="menuBtn" style="background:none;border:none;color:#E2D3F4;font-size:20px;cursor:pointer">☰</button>
      <!-- TOMBOL KEMBALI ganti Puu Chat -->
      <a href="home.html" class="nav-back">← Kembali</a>
    </div>
    <div class="nav-right" style="display:flex;align-items:center;gap:12px">
      <a href="settings.html" style="color:#b9a9d3;text-decoration:none;font-size:13px">Pengaturan</a>
      <div class="user" id="userBtn" title="Keluar"><img id="userAvatar" src="" style="width:32px;height:32px;border-radius:50%;border:2px solid #EEC291;background:#3F3b62" alt=""></div>
    </div>
  </div>

  <div class="bottom-sec" style="padding-top:0">
    <div class="side-menu" id="sideMenu" style="display:none">
      <ul style="list-style:none;padding:14px;margin:0">
        <li><a href="home.html" style="color:#E2D3F4;text-decoration:none;display:block;padding:8px 0">🏠 Beranda</a></li>
        <li><a href="chat.html" style="color:#E2D3F4;text-decoration:none;display:block;padding:8px 0">💬 Pesan</a></li>
        <li><a href="grup.html" style="color:#E2D3F4;text-decoration:none;display:block;padding:8px 0">👥 Grup</a></li>
        <li><a href="server.html" class="active" style="color:#EEC291;text-decoration:none;display:block;padding:8px 0">🛰️ Server</a></li>
        <li><a href="settings.html" style="color:#E2D3F4;text-decoration:none;display:block;padding:8px 0">⚙️ Pengaturan</a></li>
        <li><a href="#" id="logoutLink" style="color:#E2D3F4;text-decoration:none;display:block;padding:8px 0">🚪 Keluar</a></li>
      </ul>
    </div>

    <div class="srv-wrap" style="flex:1;min-width:0;width:100%">
      <!-- server rail -->
      <div class="srv-rail" id="srvRail">
        <div class="srv-icon active" data-id="home" title="Home">PU</div>
        <div id="srvList"></div>
        <div class="srv-add" id="addServerBtn" title="Buat Server">+</div>
      </div>
      <!-- channel list -->
      <div class="ch-list" id="chListPane">
        <div class="ch-head"><span id="serverName">Pilih Server</span>
          <button class="icon-btn" id="serverSettingsBtn" style="padding:4px 8px">⚙️</button>
        </div>
        <div class="ch-group">TEXT CHANNELS <span id="addChannelBtn" style="float:right;cursor:pointer">＋</span></div>
        <div id="channelList" style="flex:1;overflow-y:auto;padding-bottom:10px;color:#9b87b9;font-size:13px;padding:10px 14px">
          Belum ada server.<br>Tap + di rail kiri.
        </div>
      </div>
      <!-- chat -->
      <div class="chat" id="chatPane">
        <div class="empty-state" id="emptyChat">
          <div>💬<br><b>Pilih server untuk mulai</b></div>
        </div>

        <div id="chatView" style="display:none;flex:1;flex-direction:column;min-height:0">
          <div class="chat-head" id="chatHead">
            <button class="icon-btn" id="backBtn">←</button>
            <b># <span id="chName">general</span></b>
            <span id="chTopic" style="margin-left:8px"></span>
            <div style="margin-left:auto;display:flex;gap:6px">
              <button class="icon-btn" id="translateBtn" title="Translate otomatis">🔄</button>
              <button class="icon-btn" id="pinBtn">📌</button>
              <button class="icon-btn" id="channelSettingsBtn">⚙️</button>
            </div>
          </div>
          <div class="msg-area" id="msgArea"></div>
          <div class="composer" id="composer">
            <input id="msgInput" placeholder="Kirim pesan…">
            <button id="sendBtn">Kirim</button>
          </div>
        </div>
      </div>
      <!-- members -->
      <div class="members" id="memberPane">
        <div style="color:#9b87b9;font-size:11px;margin-bottom:8px">ANGGOTA</div>
        <div id="memberList"></div>
      </div>
    </div>
  </div>
</div>

<!-- modal server -->
<div class="modal-back" id="serverModal"><div class="modal">
  <h3 style="color:#EEC291;margin:0 0 10px">Buat Server</h3>
  <input id="sName" placeholder="Nama server">
  <input id="sIcon" type="file" accept="image/*">
  <select id="sPrivacy"><option value="publik">🌎 Publik</option><option value="privat">🔒 Privat</option></select>
  <div style="text-align:right"><button class="btn-ghost" id="cancelSrv">Batal</button> <button class="btn-primary" id="createSrv">Buat</button></div>
</div></div>

<!-- modal channel -->
<div class="modal-back" id="channelModal"><div class="modal">
  <h3 style="color:#EEC291;margin:0 0 10px">Buat Channel</h3>
  <input id="cName" placeholder="nama-channel">
  <input id="cTopic" placeholder="Topik (opsional)">
  <select id="cType"><option value="text">Text</option><option value="voice">Voice</option></select>
  <div style="text-align:right"><button class="btn-ghost" id="cancelCh">Batal</button> <button class="btn-primary" id="createCh">Buat</button></div>
</div></div>

<div id="toast" style="position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#332F54;color:#E2D3F4;padding:8px 14px;border-radius:10px;display:none;z-index:999"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL=""; const SUPABASE_ANON_KEY="";
const BLANK_AVATAR='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iODAiIHZpZXdCb3g9IjAgMCA4MCA4MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSI0MCIgY3k9IjQwIiByPSI0MCIgZmlsbD0iIzNGM2I2MiIvPjxjaXJjbGUgY3g9IjQwIiBjeT0iMzIiIHI9IjEyIiBmaWxsPSIjNTQ0RjdFIi8+PHBhdGggZD0iTTIwIDYyQzIwIDUwIDI4IDQ4IDQwIDQ4UzYwIDUwIDYwIDYyIiBmaWxsPSIjNTQ0RjdFIi8+PC9zdmc+';
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';clearTimeout(window._tt);window._tt=setTimeout(()=>t.style.display='none',1800)}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

let sb = (SUPABASE_URL && SUPABASE_ANON_KEY)? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
let user=null, servers = JSON.parse(localStorage.getItem('puu_servers')||'[]');
let currentServer=null, currentChannel=null;
let translateOn = localStorage.getItem('puu_translate')==='1';

document.getElementById('userAvatar').src = BLANK_AVATAR;

function saveServers(){ localStorage.setItem('puu_servers', JSON.stringify(servers)); }

function renderServers(){
  const box = document.getElementById('srvList'); box.innerHTML='';
  servers.forEach(s=>{
    const d=document.createElement('div'); d.className='srv-icon';
    d.textContent = s.name.slice(0,2).toUpperCase();
    if(s.icon){ d.style.backgroundImage=`url(${s.icon})`; d.style.backgroundSize='cover'; d.textContent=''; }
    d.onclick = ()=> openServer(s.id);
    if(currentServer && currentServer.id===s.id) d.classList.add('active');
    box.appendChild(d);
  });
}
renderServers();

function openServer(id){
  currentServer = servers.find(x=>x.id===id); if(!currentServer) return;
  document.getElementById('serverName').textContent = currentServer.name;
  renderServers();
  renderChannels();
  document.getElementById('chatPane').classList.add('show');
  document.getElementById('chListPane').classList.remove('hide');
}
function renderChannels(){
  const box = document.getElementById('channelList'); box.innerHTML='';
  const chs = currentServer.channels || [{id:'general', name:'general', topic:'Obrolan umum'}];
  currentServer.channels = chs;
  chs.forEach(c=>{
    const d=document.createElement('div'); d.className='ch-item' + (currentChannel && currentChannel.id===c.id?' active':'');
    d.textContent = '# ' + c.name;
    d.onclick = ()=> openChannel(c);
    box.appendChild(d);
  });
}
function openChannel(c){
  currentChannel = c;
  document.getElementById('emptyChat').style.display='none';
  document.getElementById('chatView').style.display='flex';
  document.getElementById('chName').textContent = c.name;
  document.getElementById('chTopic').textContent = c.topic || '';
  document.getElementById('msgInput').placeholder = 'Kirim pesan ke #' + c.name;
  loadMessages();
  renderMembers();
  if(window.innerWidth <= 820){
    document.getElementById('chListPane').classList.add('hide');
    document.getElementById('chatPane').classList.add('show');
  }
}
function loadMessages(){
  const box = document.getElementById('msgArea');
  box.innerHTML = '<div style="color:#9b87b9;font-size:13px">Belum ada pesan di #' + esc(currentChannel.name) + '</div>';
}
function addMsg(text){
  const box = document.getElementById('msgArea');
  if(box.textContent.includes('Belum ada pesan')) box.innerHTML='';
  const out = translateOn? '[ID] ' + text : text;
  const div = document.createElement('div'); div.className='msg';
  div.innerHTML = `<img src="${BLANK_AVATAR}"><div class="msg-bubble"><h4>user <span>• sekarang</span></h4><p>${esc(out)}</p></div>`;
  box.appendChild(div); box.scrollTop = box.scrollHeight;
}
document.getElementById('sendBtn').onclick = ()=>{
  const i=document.getElementById('msgInput'); const t=i.value.trim(); if(!t||!currentChannel) return; i.value=''; addMsg(t);
};
document.getElementById('msgInput').addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); document.getElementById('sendBtn').click() }});

function renderMembers(){
  const box=document.getElementById('memberList'); box.innerHTML='';
  ['Admin','Mod','user','user'].forEach((n,i)=>{
    const d=document.createElement('div'); d.className='member';
    d.innerHTML = `<img src="${BLANK_AVATAR}"><span>${n}${i<2?'<span class="role">'+n+'</span>':''}</span>`;
    box.appendChild(d);
  });
}

// create server
document.getElementById('addServerBtn').onclick = ()=> document.getElementById('serverModal').classList.add('show');
document.getElementById('cancelSrv').onclick = ()=> document.getElementById('serverModal').classList.remove('show');
document.getElementById('createSrv').onclick = ()=>{
  const name = document.getElementById('sName').value.trim() || 'Server Baru';
  const privacy = document.getElementById('sPrivacy').value;
  const s = {id:'srv_'+Date.now(), name, privacy, icon:null, channels:[{id:'general', name:'general', topic:'Obrolan umum'}]};
  servers.unshift(s); saveServers(); renderServers();
  document.getElementById('serverModal').classList.remove('show');
  document.getElementById('sName').value='';
  toast('Server dibuat'); openServer(s.id);
};

// create channel
document.getElementById('addChannelBtn').onclick = ()=>{ if(!currentServer){toast('Pilih server dulu');return} document.getElementById('channelModal').classList.add('show') };
document.getElementById('cancelCh').onclick = ()=> document.getElementById('channelModal').classList.remove('show');
document.getElementById('createCh').onclick = ()=>{
  const name = document.getElementById('cName').value.trim().replace(/\s+/g,'-').toLowerCase();
  if(!name) return;
  const topic = document.getElementById('cTopic').value.trim();
  currentServer.channels.push({id:'ch_'+Date.now(), name, topic, type:document.getElementById('cType').value});
  saveServers(); renderChannels();
  document.getElementById('channelModal').classList.remove('show');
  document.getElementById('cName').value=''; document.getElementById('cTopic').value='';
  toast('Channel #' + name + ' dibuat');
};

// translate
const trBtn = document.getElementById('translateBtn');
function syncTr(){ trBtn.style.opacity = translateOn? '1' : '.5' } syncTr();
trBtn.onclick = ()=>{ translateOn=!translateOn; localStorage.setItem('puu_translate', translateOn?'1':'0'); syncTr(); toast(translateOn?'Translate ON 🔄':'Translate OFF') };

// nav to settings
document.getElementById('serverSettingsBtn').onclick = ()=>{
  if(!currentServer){ toast('Pilih server dulu'); return }
  localStorage.setItem('puu_edit_server', JSON.stringify(currentServer));
  location.href = 'server-settings.html';
};
document.getElementById('channelSettingsBtn').onclick = ()=>{
  if(!currentChannel){ toast('Pilih channel dulu'); return }
  localStorage.setItem('puu_edit_channel', JSON.stringify({...currentChannel, server_id: currentServer?.id}));
  location.href = 'channel-settings.html';
};
document.getElementById('pinBtn').onclick = ()=> toast('Pesan disematkan');

// back buttons
document.getElementById('backBtn').onclick = ()=>{
  document.getElementById('chatPane').classList.remove('show');
  document.getElementById('chListPane').classList.remove('hide');
  currentChannel = null;
  document.getElementById('chatView').style.display='none';
  document.getElementById('emptyChat').style.display='flex';
};

// side menu / logout
document.getElementById('menuBtn').onclick = ()=> document.getElementById('sideMenu').classList.toggle('active');
async function doLogout(){ if(sb) await sb.auth.signOut(); location.replace('login.html') }
document.getElementById('logoutLink')?.addEventListener('click', e=>{ e.preventDefault(); doLogout() });
document.getElementById('userBtn').onclick = doLogout;
</script>
</body>
  </html>
