<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Puu Chat – Server</title>
<link rel="stylesheet" href="assets/css/puu.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="topbar">
  <button class="hamburger icon-btn" id="hamburger">☰</button>
  <div class="logo-wrap"><div class="logo-mark">P</div><div class="logo-text">Puu <span>Chat</span></div></div>
  <div class="topbar-right">
    <a class="icon-btn" href="settings.html">⚙️</a>
    <a class="top-user" href="profil.html"><img id="topAvatar" src="assets/img/avatar-blank.png" alt=""></a>
  </div>
</header>

<div class="app-body" style="height:calc(100vh - 68px)">
<div class="server-shell" style="width:100%">
  <div class="server-rail">
    <div class="srv-icon active">P</div>
    <div class="srv-icon add" onclick="showToast('Buat server – segera')">+</div>
  </div>
  <div class="server-channels">
    <div class="server-channels-top">
      <h3>Komunitas Puu</h3>
      <div class="small muted">0 anggota online</div>
    </div>
    <div class="channel-list">
      <div class="channel-item active"># umum</div>
      <div class="channel-item"># ngobrol</div>
    </div>
  </div>
  <div class="server-main">
    <div class="server-topbar"><div style="font-weight:700"># umum</div></div>
    <div class="server-messages" style="display:flex;align-items:center;justify-content:center;color:#b99ecf">
      Belum ada pesan di channel ini
    </div>
    <div class="chat-composer">
      <div class="composer-inner">
        <input class="composer-input" placeholder="Kirim pesan ke #umum">
        <button class="send-btn" onclick="showToast('Pesan terkirim (demo)')">Kirim</button>
      </div>
    </div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
