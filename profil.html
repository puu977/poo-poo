<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Puu Chat – Profil</title>
<link rel="stylesheet" href="assets/css/puu.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="topbar">
  <button class="hamburger icon-btn" id="hamburger">☰</button>
  <div class="logo-wrap"><div class="logo-mark">P</div><div class="logo-text">Puu <span>Chat</span></div></div>
  <div class="topbar-right">
    <a class="icon-btn" href="settings.html">⚙️</a>
    <a class="top-user" href="profil.html"><img id="topAvatar" src="assets/img/avatar-blank.png" alt=""></a>
  </div>
</header>

<div class="app-body">
<aside class="sidebar" id="sidebar">
  <a class="nav-item" href="index.html">Home</a>
  <a class="nav-item" href="teman.html">Teman</a>
  <a class="nav-item" href="chat.html">Pesan</a>
  <a class="nav-item" href="grup.html">Grup</a>
  <a class="nav-item" href="server.html">Server</a>
  <a class="nav-item" href="settings.html">Pengaturan</a>
</aside>

<main class="main">
<div class="view-inner">
  <div class="section-title">Profil</div>
  <div class="card" style="padding:20px;max-width:620px">
    <div class="avatar-row" style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
      <img id="profileAvatarPreview" src="assets/img/avatar-blank.png" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid rgba(238,194,145,.4)" alt="">
      <div>
        <input type="file" id="avatarUpload" accept="image/*">
        <div class="small muted">JPG/PNG, maks 2MB</div>
      </div>
    </div>
    <div class="form-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="field"><label>Nama tampilan</label><input class="input" id="pfName" placeholder="Nama kamu"></div>
      <div class="field"><label>Username</label><input class="input" placeholder="@username"></div>
      <div class="field full" style="grid-column:1/-1"><label>Bio</label><textarea class="textarea" placeholder="Ceritakan sedikit tentang kamu…"></textarea></div>
      <div class="field"><button class="btn btn-accent" onclick="showToast('Profil disimpan')">Simpan</button></div>
    </div>
  </div>
</div>
</main>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
