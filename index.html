<!DOCTYPE html><html lang="id"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Puu Chat</title>
<link rel="stylesheet" href="assets/css/main.css">
</head><body>

<header class="top-bar">
  <button id="menu">☰</button>
  <h1>Puu <span>Chat</span></h1>
  <input placeholder="Cari...">
</header>

<nav id="sidebar" class="sidebar">
  <a href="index.html">Home</a>
  <a href="chat.html">Chat</a>
  <a href="groups.html">Groups</a>
</nav>

<main>
  <div class="create-card" onclick="location='create-post.html'">
    udah, gak usah dipikirin, buat status aja😂
  </div>
  <div id="feed">Loading...</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script>
document.getElementById('menu').onclick=()=>document.getElementById('sidebar').classList.toggle('open');
async function load(){
 try{
  const {data,error}=await sb.from('posts').select('*').order('created_at',{ascending:false});
  if(error) throw error;
  document.getElementById('feed').innerHTML = data.map(p=>`<div class="post">${p.text}</div>`).join('');
 }catch(e){
  document.getElementById('feed').innerHTML = 'Error: '+e.message;
 }
}
load();
</script>
</body></html>
