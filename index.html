<div class="main-container">

      <h2 style="color:#E2D3F4;margin:0;font-weight:600">Puu Chat</h2>
    </div>
    <div class="nav-right">
      <div class="search-bar"><img src="data:image/svg+xml;base64,PHN2ZyBmaWxsPSIjMzMyRjU0IiB2aWV3Qm94PSIwIDAgMjQgMjQiPjxwYXRoIGQ9Ik0xNS41IDE0aC0uN2wtLjMtLjNhNi41IDYuNSAwIDEgMCAuOTguOThsLjMuMy4wIC43IDEuNSAxLjV2LjdsLTMuNS0zLjV6bS02IDBBNC41IDQuNSAwIDEgMSAxNCA5LjUgNC41IDQuNSAwIDAgMSA5LjUgMTR6Ii8+PC9zdmc+"><input placeholder="Cari..."></div>
      <div class="user"><img src="https://i.pravatar.cc/40"></div>
    </div>
  </div>

  <div class="bottom-sec">
    <div class="side-menu" id="side">
      <div class="search-bar"><input placeholder="Cari..."></div>
      <ul>
        <li><img src=""><a href="index.html" class="active">Home</a></li>
        <li><img src=""><a href="chat.html">Chat</a></li>
        <li><img src=""><a href="groups.html">Groups</a></li>
        <li><img src=""><a href="settings.html">Settings</a></li>
      </ul>
      <div class="chat-sec">
        <div class="chat"><img src="https://i.pravatar.cc/35"><p>Template chat</p></div>
      </div>
    </div>

    <div class="chat-section">
      <div class="chat-header">
        <div class="user-header">
          <div class="user-main"><img src="https://i.pravatar.cc/50"></div>
          <h2>Home</h2>
        </div>
        <img class="threedot" src="">
      </div>

      <div class="all-chat" id="feed">
        <div class="chat-box"><div class="chat-txt"><p>Loading...</p></div></div>
      </div>

      <div class="chat-type" onclick="location='create-post.html'">
        <img src="data:image/svg+xml;base64,PHN2ZyBmaWxsPSIjRTJEM0Y0IiB2aWV3Qm94PSIwIDAgMjQiPjxwYXRoIGQ9Ik0xOSA3bC0xLjQxLTEuNDEtNS4xIDUuMS01LjEtNS4xTDUgN2w3IDcgNy03eiIvPjwvc3ZnPg==">
        <div class="message-type">
          <input placeholder="udah, gak usah dipikirin, buat status aja😂" readonly>
        </div>
        <img class="send-icon" src="data:image/svg+xml;base64,PHN2ZyBmaWxsPSIjRTJEM0Y0IiB2aWV3Qm94PSIwIDAgMjQiPjxwYXRoIGQ9Ik0yLjAxIDIxTDIzIDEyIDIuMDEgM0wyIDEwbDUgMi01IDJ6Ii8+PC9zdmc+">
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script>
// hamburger FIX
document.getElementById('menu').onclick = () => document.getElementById('side').classList.toggle('active');

// feed
async function load(){
  if(typeof sb === 'undefined'){
    document.getElementById('feed').innerHTML = '<div class="chat-box"><div class="chat-txt"><h4>Error</h4><p>sb is not defined - cek assets/js/supabase.js</p></div></div>';
    return;
  }
  const {data,error} = await sb.from('posts').select('*').order('created_at',{ascending:false}).limit(20);
  if(error){document.getElementById('feed').innerHTML = `<div class="chat-box"><div class="chat-txt"><p>${error.message}</p></div></div>`;return}
  document.getElementById('feed').innerHTML = data.map(p=>`
    <div class="chat-box ${p.user==='User'?'my-message':''}">
      <img src="https://i.pravatar.cc/40">
      <div class="chat-txt">
        <h4>${p.user||'User'} <span>${new Date(p.created_at).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}</span></h4>
        <p>${(p.text||'').replace(/</g,'&lt;')}</p>
        ${p.media_url?`<img src="${p.media_url}" style="width:100%;margin-top:8px;border-radius:10px;border:none">`:''}
      </div>
    </div>`).join('') || '<div class="chat-box"><div class="chat-txt"><p>Belum ada postingan</p></div></div>';
}
load();
</script>
</body></html>
