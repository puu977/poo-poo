<!DOCTYPE html><html lang="id"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Puu Chat</title>
<link rel="stylesheet" href="./assets/css/main.css">
</head><body>
<div class="main-container">
  <div class="navbar">
    <div class="nav-left"><button class="toggle-btn" id="menu">☰</button><h2>Puu Chat</h2></div>
  </div>
  <div class="bottom-sec">
    <div class="side-menu" id="side">
      <ul>
        <li><a href="index.html" class="active">Feed</a></li>
        <li><a href="chat.html">Chat</a></li>
        <li><a href="grup.html">Grup</a></li>
        <li><a href="server.html">Server</a></li>
        <li><a href="setting.html">Setting</a></li>
      </ul>
    </div>
    <div class="chat-section">
      <div class="all-chat">
        <div id="stories"></div>
        <div class="chat-box" onclick="location='post.html'" style="cursor:pointer">
          <div></div><div class="chat-txt"><p style="color:#9386a2">udah, gak usah dipikirin, buat status aja😂</p></div>
        </div>
        <div id="posts"></div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./assets/js/supabase-client.js"></script>
<script>
if(!localStorage.puu_id)localStorage.puu_id='u_'+Math.random().toString(36).slice(2,9);
if(!localStorage.puu_name)localStorage.puu_name='Anonim';
const liked=JSON.parse(localStorage.liked||'{}');
const menu=document.getElementById('menu'),side=document.getElementById('side');
const overlay=document.createElement('div');overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:none';document.body.appendChild(overlay);
function toggle(){side.classList.toggle('active');overlay.style.display=side.classList.contains('active')?'block':'none'}
menu.onclick=toggle;overlay.onclick=toggle;

async function like(id,el){const l=!!liked[id];let c=+el.dataset.likes||0;c=l?c-1:c+1;liked[id]=!l;localStorage.liked=JSON.stringify(liked);el.dataset.likes=c;el.classList.toggle('liked',!l);el.innerHTML=!l?`❤️ <b>${c}</b>`:`🤍`;await sb.from('posts').update({likes:c}).eq('id',id)}
function share(id){const u=location.href.split('#')[0]+'#post-'+id;navigator.share?navigator.share({title:'Puu Chat',url:u}):(navigator.clipboard.writeText(u),alert('Link disalin!'))}

async function load(){
  const {data}=await sb.from('posts').select('*').order('created_at',{ascending:false}).limit(50);
  const stories=data.filter(d=>d.type==='story');
  document.getElementById('stories').innerHTML=`<div onclick="location='story.html'" style="text-align:center"><div style="width:62px;height:62px;border-radius:50%;border:2px dashed #EEC291;display:flex;align-items:center;justify-content:center;font-size:28px;color:#EEC291">+</div><p style="color:#E2D3F4;font-size:11px;margin-top:4px">Buat</p></div>`+stories.map(s=>`<div style="text-align:center"><img src="${s.media_url}" onclick="window.open('${s.media_url}')"><p style="color:#E2D3F4;font-size:11px;margin-top:4px">${s.username}</p></div>`).join('');
  const posts=data.filter(d=>d.type!=='story');
  document.getElementById('posts').innerHTML=posts.map(p=>{const t=new Date(p.created_at),l=!!liked[p.id];return`<div id="post-${p.id}" class="chat-box"><div></div><div class="chat-txt"><h4>${p.username}<span style="opacity:.7;font-size:12px">${t.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}</span></h4><p>${(p.text||'').replace(/</g,'&lt;')}</p>${p.media_url?`<img src="${p.media_url}" class="post-img">`:''}<div class="action"><span class="like ${l?'liked':''}" data-likes="${p.likes||0}" onclick="like(${p.id},this)">${l?`❤️ <b>${p.likes||0}</b>`:`🤍`}</span><span onclick="location='comment.html?id=${p.id}'">Komentar</span><span onclick="share(${p.id})">Bagikan</span></div></div></div>`}).join('');
}
load();
</script></body></html>
