<!DOCTYPE html><html lang="id"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Puu Chat</title>
<link rel="stylesheet" href="assets/css/main.css">
<style>
body{margin:0;background:#f0f2f5;font-family:system-ui}
.top{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#fff;position:sticky;top:0;z-index:100;border-bottom:1px solid #ddd}
.ham{font-size:24px;background:none;border:none;cursor:pointer;padding:4px}
.logo{font-weight:700;font-size:20px}.logo span{color:#1877f2}
.search{flex:1}.search input{width:100%;padding:7px 12px;border:none;background:#f0f2f5;border-radius:20px}
.sidebar{position:fixed;left:-260px;top:0;width:250px;height:100%;background:#fff;z-index:200;transition:.25s;padding-top:56px}
.sidebar.open{left:0}
.sidebar a{display:block;padding:12px 16px;color:#000;text-decoration:none}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;display:none}
.overlay.show{display:block}
.main{max-width:600px;margin:0 auto;padding:12px}
.card{background:#fff;padding:12px;border-radius:8px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.1);cursor:pointer}
.post{background:#fff;padding:12px;border-radius:8px;margin-bottom:12px}
.post-h{display:flex;gap:8px;align-items:center}
.ava{width:36px;height:36px;border-radius:50%;background:#ddd}
</style>
</head><body>
<div class="top">
  <button class="ham" id="ham">☰</button>
  <div class="logo">Puu <span>Chat</span></div>
  <div class="search"><input placeholder="Cari..."></div>
</div>

<div class="overlay" id="ov"></div>
<nav class="sidebar" id="sb">
  <a href="index.html">Home</a>
  <a href="chat.html">Chat</a>
  <a href="groups.html">Groups</a>
  <a href="server.html">Server</a>
  <a href="settings.html">Settings</a>
</nav>

<main class="main">
  <div class="card" onclick="location='create-post.html'">udah, gak usah dipikirin, buat status aja😂</div>
  <div id="feed"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script>
// hamburger - jalan duluan
const ham=document.getElementById('ham'), sbEl=document.getElementById('sb'), ov=document.getElementById('ov');
ham.onclick=()=>{sbEl.classList.add('open');ov.classList.add('show')};
ov.onclick=()=>{sbEl.classList.remove('open');ov.classList.remove('show')};

// feed pakai supabase lu
async function load(){
 try{
  const {data}=await sb.from('posts').select('*').order('created_at',{ascending:false}).limit(20);
  document.getElementById('feed').innerHTML=(data||[]).map(p=>`
   <div class="post">
    <div class="post-h"><div class="ava"></div><div><b>${p.user||'User'}</b><div style="font-size:12px;color:#666">${new Date(p.created_at).toLocaleString('id-ID')}</div></div></div>
    <div style="margin-top:8px">${p.text||''}${p.media_url?`<img src="${p.media_url}" style="width:100%;border-radius:8px;margin-top:8px">`:''}</div>
   </div>`).join('');
 }catch(e){document.getElementById('feed').innerHTML='<div class="post">Feed error - cek supabase.js</div>'}
}
load();
</script>
</body></html>
