<!DOCTYPE html><html lang="id"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Puu Puu</title>
<link rel="stylesheet" href="assets/css/main.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<style>
body{background:#2d2650;margin:0;color:#E2D3F4;font-family:system-ui}
.top{position:fixed;top:0;left:0;right:0;background:#332F54;padding:12px;display:flex;align-items:center;gap:10px;z-index:10}
.post-card{background:#4a4175;margin:12px;border-radius:16px;padding:12px;position:relative}
.post-head{display:flex;gap:10px;align-items:center}
.ava{width:40px;height:40px;border-radius:50%;background:#666}
.post-actions{display:flex;gap:20px;margin-top:10px;padding-top:8px;border-top:1px solid #5a5180}
.btn-act{background:none;border:none;color:#E2D3F4;font-size:14px;display:flex;align-items:center;gap:6px}
.menu-btn,.skip-btn{position:absolute;top:10px;right:10px;background:none;border:none;color:#E2D3F4;font-size:20px}
.skip-btn{right:40px}
</style>
</head><body>
<div class="top"><img src="assets/logo.png" width="28"><b>Puu Puu</b></div>
<div style="height:60px"></div>
<div id="feed"></div>

<script>
const myId = localStorage.puu_id || (localStorage.puu_id='u_'+Math.random().toString(36).slice(2,9));
const feed = document.getElementById('feed');
let skipped = JSON.parse(localStorage.getItem('skipped')||'[]');

async function load(){
 const {data} = await supa.from('posts').select('*').order('id',{ascending:false});
 feed.innerHTML='';
 data.filter(p=>!skipped.includes(p.id)).forEach(p=>{
  const isMine = p.user_id===myId;
  const card = document.createElement('div');
  card.className='post-card'; card.id='post-'+p.id;
  card.innerHTML=`
   ${isMine?`<button class="menu-btn" onclick="menuPost(${p.id})">⋮</button>`:`<button class="skip-btn" onclick="skipPost(${p.id})">✕</button>`}
   <div class="post-head">
    <div class="ava"></div>
    <div><b>${p.username||'Anonim'}</b><div style="font-size:12px;opacity:.7">${new Date(p.created_at).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</div></div>
   </div>
   <p style="margin:10px 0">${p.content||''}</p>
   ${p.image_url?`<img src="${p.image_url}" style="width:100%;border-radius:12px;max-height:400px;object-fit:cover">`:''}
   <div class="post-actions">
    <button class="btn-act" onclick="likePost(${p.id},${p.likes_count||0})">Suka<span id="l${p.id}">${p.likes_count||0}</span></button>
    <button class="btn-act" onclick="location.href='comment.html?id=${p.id}'">Komentar</button>
    <button class="btn-act" onclick="sharePost(${p.id},${p.shares_count||0})">Bagikan<span id="s${p.id}">${p.shares_count||0}</span></button>
   </div>`;
  feed.appendChild(card);
 });
}

async function likePost(id,now){
 const newVal = now+1;
 document.getElementById('l'+id).textContent = newVal;
 await supa.from('posts').update({likes_count:newVal}).eq('id',id);
}

async function sharePost(id,now){
 const newVal = now+1;
 document.getElementById('s'+id).textContent = newVal;
 await supa.from('posts').update({shares_count:newVal}).eq('id',id);
 navigator.clipboard.writeText(location.origin+location.pathname+'#post-'+id);
 alert('Link disalin!');
}

function skipPost(id){
 skipped.push(id); localStorage.setItem('skipped',JSON.stringify(skipped));
 document.getElementById('post-'+id).remove();
}

async function menuPost(id,txt){
 const act = prompt('⋮ Menu:\n1. Edit\n2. Hapus\nPilih 1/2');
 async function menuPost(id){
 location.href = `edit-post.html?id=${id}`;
}
 if(act==='2'){ if(confirm('Hapus?')){ await supa.from('posts').delete().eq('id',id); load(); } }
}

load();
supa.channel('feed').on('postgres_changes',{event:'*',schema:'public',table:'posts'},load).subscribe();
</script>
</body></html>
