<!DOCTYPE html><html lang="id"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Puu Chat</title>
<link rel="stylesheet" href="assets/css/main.css">
</head><body>
<div id="header"></div>
<div class="wrap">
  <div id="sidebar"></div>
  <main class="main">
    <div id="makepost"></div>
    <div id="feed"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script>
async function load(id,file){document.getElementById(id).innerHTML=await (await fetch(file)).text();}
Promise.all([
  load('header','components/comp-header.html'),
  load('sidebar','components/comp-sidebar.html'),
  load('makepost','components/comp-make-post.html')
]).then(()=>{
  const s=document.createElement('script'); s.src='assets/js/comp-js-sidebar.js'; document.body.appendChild(s);
  const f=document.createElement('script'); f.src='assets/js/comp-js-feed.js'; document.body.appendChild(f);
  document.getElementById('makepost').onclick=()=>location='create-post.html';
});
</script></body></html>
