<!DOCTYPE html><html lang="id"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Puu Puu</title>
<link rel="stylesheet" href="assets/css/main.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
</head><body>
<header class="top-bar">
  <div class="brand"><img src="assets/logo.png" class="logo"><span>Puu Puu</span></div>
  <div class="actions">
    <button class="icon-btn" onclick="location.href='search.html'"><img src="assets/search.png"></button>
    <button class="icon-btn" onclick="location.href='chat.html'"><img src="assets/chat.png"></button>
    <a href="profil.html" class="user"><img src="assets/avatar.png"></a>
  </div>
</header>

<main class="bottom-sec">
  <div id="debug" style="position:fixed;top:60px;left:0;right:0;background:#111;color:#0f0;padding:6px;font-size:11px;z-index:999;max-height:80px;overflow:auto"></div>
  <div id="feed" style="margin-top:90px;width:100%"></div>
</main>

<nav class="bot-nav">
  <a href="index.html" class="active"><img src="assets/home.png"></a>
  <a href="create-post.html"><img src="assets/plus.png"></a>
  <a href="video.html"><img src="assets/video.png"></a>
  <a href="profil.html"><img src="assets/user.png"></a>
</nav>

<script>
const feedEl = document.getElementById('feed');
const debug = document.getElementById('debug');

async function loadFeed(){
 debug.textContent = 'connecting...';
 try{
  const { data, error } = await supa.from('posts').select('*').order('id',{ascending:false}).limit(20);
  if(error){ debug.textContent = 'ERROR: '+error.message; return; }
  debug.textContent = 'OK! '+data.length+' post ketemu';
  feedEl.innerHTML='';
  data.forEach(p=>{
    const txt = p.content || p.text || '';
    feedEl.innerHTML += `<div class="post-card">
      <div class="post-head"><img src="assets/avatar.png"><div><b>${p.username||'Anonim'}</b><div class="time">#${p.id}</div></div></div>
      ${txt?`<p>${txt}</p>`:''}
    </div>`;
  });
 }catch(e){ debug.textContent = 'JS ERR: '+e.message; }
}
loadFeed();
supa.channel('posts').on('postgres_changes',{event:'*',schema:'public',table:'posts'},loadFeed).subscribe();
</script>
</body></html>
