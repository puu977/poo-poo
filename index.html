<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Puu Chat</title>
<link rel="stylesheet" href="assets/css/main.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<style>
.post-feed{width:100%}
.post-card{background:#49426E;border:2px solid #544F7E;border-radius:15px;padding:15px;margin:0 0 15px}
.post-card.head{display:flex;gap:12px;align-items:center}
.post-card.head img{width:40px;border-radius:50%;border:3px solid #EEC291}
.post-card.head b{color:#EEC291}
.post-card p{color:#DDD9D0;margin:10px 0;white-space:pre-wrap}
.post-card img.post-img{width:100%;border-radius:12px;margin-top:8px;max-height:400px;object-fit:cover}
.post-actions{display:flex;gap:20px;margin-top:10px}
.post-actions button{background:none;border:none;color:#E2D3F4;cursor:pointer;font-size:14px}
.composer{background:#332F54;padding:15px;border-radius:15px;margin-bottom:15px}
.composer textarea{width:100%;background:#49426E;border:2px solid #544F7E;color:#E2D3F4;padding:10px;border-radius:10px;resize:none}
.composer.btn{background:#EEC291;color:#332F54;padding:8px 16px;border-radius:10px;font-weight:600;margin-top:8px;cursor:pointer;border:none}
</style>
</head>
<body>
<div class="main-container">
  <div class="navbar">
    <div class="nav-left">
      <button class="toggle-btn" onclick="document.querySelector('.side-menu').classList.toggle('active')"><img src="assets/menu.png"></button>
      <img src="assets/logo.png" class="main-logo" alt="Puu">
    </div>
    <div class="nav-right">
      <div class="search-bar"><input placeholder="Cari..."><img src="assets/search.png"></div>
      <div class="user"><img src="assets/avatar.png"></div>
    </div>
  </div>

  <div class="bottom-sec">
    <div class="side-menu">
      <ul>
        <li><img src="assets/feed.png"><a href="index.html" class="active">Feed</a></li>
        <li><img src="assets/chat.png"><a href="chat.html">Chat</a></li>
        <li><img src="assets/group.png"><a href="group.html">Group</a></li>
        <li><img src="assets/server.png"><a href="server.html">Server</a></li>
        <li><img src="assets/settings.png"><a href="settings.html">Settings</a></li>
      </ul>
    </div>

    <div class="chat-section">
      <div class="chat-header">
        <div class="user-header"><div class="user-main"><img src="assets/avatar.png"></div><h2>Feed</h2></div>
      </div>

      <div class="all-chat">
        <div class="post-feed">
          <div class="composer">
            <textarea id="content" rows="2" placeholder="apa yang anda pikirkan.?"></textarea>
            <input type="file" id="img" accept="image/*" hidden
            <button class="btn" onclick="img.click()">🖼️ Gambar</button>
            <button class="btn" onclick="posting()">Posting</button>
          </div>
          <div id="feed"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const feedEl = document.getElementById('feed');

async function render(){
  const { data } = await supa.from('posts').select('*').order('created_at',{ascending:false});
  feedEl.innerHTML = '';
  data.forEach(p=>{
    feedEl.innerHTML += `<div class="post-card">
      <div class="head"><img src="assets/avatar.png"><div><b>${p.username||'Anonim'}</b><br><span style="font-size:12px;color:#9386a2">${new Date(p.created_at).toLocaleString('id-ID')}</span></div></div>
      ${p.content?`<p>${p.content}</p>`:''}
      ${p.image_url?`<img class="post-img" src="${p.image_url}">`:''}
      <div class="post-actions">
        <button onclick="like(${p.id},${p.likes||0})">❤️ ${p.likes||0}</button>
        <button onclick="location='comment.html?id=${p.id}'">💬</button>
        <button onclick="share(${p.id},${p.shares||0})">↗️ ${p.shares||0}</button>
      </div>
    </div>`;
  });
}

async function posting(){
  const c = content.value.trim();
  const f = img.files[0]; let url = null;
  if(f){ const n = Date.now()+'-'+f.name; await supa.storage.from('posts').upload(n,f); url = supa.storage.from('posts').getPublicUrl(n).data.publicUrl; }
  if(!c &&!url) return;
  await supa.from('posts').insert({username:'Anonim',content:c,image_url:url,likes:0,shares:0});
  content.value=''; img.value='';
}

async function like(id,cur){ await supa.from('posts').update({likes:cur+1}).eq('id',id); }
async function share(id,cur){ await supa.from('posts').update({shares:cur+1}).eq('id',id); }

// REALTIME - ini yang bikin gak dummy
supa.channel('posts-realtime')
 .on('postgres_changes',{event:'*',schema:'public',table:'posts'}, payload=>{ render(); })
 .subscribe();

render();
</script>
</body>
</html>
