<!DOCTYPE html><html lang="id"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Puu Chat</title>
<link rel="stylesheet" href="./assets/css/main.css">
<style>
:root{--bg:#332F54;--card:#3F3B62;--bar:#49426E;--accent:#EEC291}
body{background:var(--bg);margin:0;color:#E2D3F4;font-family:system-ui}
.header{position:sticky;top:0;background:var(--bar);padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:10}
.header h1{margin:0;font-size:20px;color:#E2D3F4}
.wrap{max-width:700px;margin:0 auto;padding:12px 12px 80px}
.create{background:var(--card);border-radius:14px;padding:12px;margin-bottom:14px}
.create textarea{width:100%;background:#2e2a4d;border:none;border-radius:10px;padding:10px;color:#E2D3F4;min-height:60px;resize:none;font-size:15px}
.create.row{display:flex;gap:8px;margin-top:8px;align-items:center}
.create button{background:var(--accent);color:var(--bg);border:none;border-radius:10px;padding:8px 14px;font-weight:700}
.create.icon{font-size:22px;color:#b8a9d4;cursor:pointer}
.post{background:var(--card);border-radius:14px;padding:0;margin-bottom:14px;overflow:hidden}
.post-head{display:flex;gap:10px;padding:12px 12px 0;align-items:center}
.avatar{width:36px;height:36px;border-radius:50%;background:#544F7E}
.name{font-weight:600;color:var(--accent);font-size:14px}.time{font-size:11px;color:#9386a2}
.post-text{padding:8px 12px;white-space:pre-wrap;word-break:break-word}
.post-img{width:100%;max-height:500px;object-fit:contain;background:#000}
.post-actions{display:flex;justify-content:space-around;border-top:1px solid #544F7E}
.post-actions span{flex:1;text-align:center;padding:12px 0;color:#b8a9d4;font-size:14px;cursor:pointer}
.post-actions span b{margin-left:4px;color:#E2D3F4}.liked{color:#ff6b81!important}
</style>
</head><body>
<div class="header"><span style="font-size:24px">☰</span><h1>Puu Chat</h1></div>
<div class="wrap">
  <div class="create">
    <textarea id="txt" placeholder="Apa yang kamu pikirkan?"></textarea>
    <div class="row">
      <span class="icon" onclick="img.click()">🖼️</span><input type="file" id="img" hidden accept="image/*">
      <span style="flex:1"></span>
      <button id="postBtn">Posting</button>
    </div>
  </div>
  <div id="feed"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./assets/js/supabase-client.js"></script>
<script>
if(!localStorage.puu_name)localStorage.puu_name='Anonim'+Math.floor(Math.random()*900+100);
const me=localStorage.puu_name; const liked=JSON.parse(localStorage.liked_posts||'{}');
const txt=document.getElementById('txt'), img=document.getElementById('img'), btn=document.getElementById('postBtn');

btn.onclick=async()=>{
  const t=txt.value.trim(), f=img.files[0]; if(!t&&!f)return;
  btn.disabled=true; let url=null;
  if(f){const p=`posts/${Date.now()}_${f.name}`; await sb.storage.from('comment-files').upload(p,f); url=sb.storage.from('comment-files').getPublicUrl(p).data.publicUrl}
  await sb.from('posts').insert({username:me,content:t,image_url:url,likes:0,shares:0});
  txt.value='';img.value='';btn.disabled=false;load();
};

async function load(){
  const {data}=await sb.from('posts').select('*').order('created_at',{ascending:false}).limit(50);
  const feed=document.getElementById('feed'); feed.innerHTML='';
  for(const p of data){
    const {count}=await sb.from('comments').select('*',{count:'exact',head:true}).eq('post_id',p.id);
    const isL=!!liked[p.id];
    feed.innerHTML+=`<div class="post">
      <div class="post-head"><div class="avatar"></div><div><div class="name">${p.username}</div><div class="time">${new Date(p.created_at).toLocaleString('id-ID')}</div></div></div>
      ${p.content?`<div class="post-text">${p.content.replace(/</g,'&lt;')}</div>`:''}
      ${p.image_url?`<img src="${p.image_url}" class="post-img">`:''}
      <div class="post-actions">
        <span onclick="like(${p.id},this)" class="${isL?'liked':''}">${isL?'❤️':'🤍'} <b>${p.likes||0}</b></span>
        <span onclick="location='comment.html?id=${p.id}'">💬 <b>${count||0}</b> Komentar</span>
        <span onclick="share(${p.id})">↗️ <b>${p.shares||0}</b> Bagikan</span>
      </div>
    </div>`;
  }
}
async function like(id,el){const l=!!liked[id];let n=parseInt(el.querySelector('b').textContent);n=l?n-1:n+1;liked[id]=!l;localStorage.liked_posts=JSON.stringify(liked);el.querySelector('b').textContent=n;el.classList.toggle('liked',!l);el.innerHTML=`${!l?'❤️':'🤍'} <b>${n}</b>`;await sb.from('posts').update({likes:n}).eq('id',id)}
async function share(id){const url=location.origin+location.pathname.replace('index.html','')+`post.html?id=${id}`;const {data}=await sb.from('posts').select('shares').eq('id',id).single();await sb.from('posts').update({shares:(data.shares||0)+1}).eq('id',id);if(navigator.share)navigator.share({title:'Puu Chat',url});else{navigator.clipboard.writeText(url);alert('Link disalin')};load()}
load();setInterval(load,8000);
</script></body></html>
