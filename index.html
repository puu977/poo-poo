      <div class="all-chat" id="feed">
        <div class="chat-box"><div class="chat-txt"><p>Loading...</p></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./assets/js/supabase-client.js"></script>
<script>
// === PROFIL BLANK & ID ACAK ===
if(!localStorage.puu_id){ localStorage.puu_id = 'u_'+Math.random().toString(36).slice(2,9) }
const myId = localStorage.puu_id;
const myName = localStorage.puu_name || ''; // kosong = blank
const myAvatar = localStorage.puu_avatar || ''; // kosong = blank

function blankAvatar(size, border=true){
  const d=document.createElement('div');
  d.style.width=size+'px'; d.style.height=size+'px';
  d.style.borderRadius='50%';
  d.style.background = myAvatar ? `url(${myAvatar}) center/cover` : '#49426E';
  d.style.flexShrink='0';
  if(border) d.style.border='3px solid #EEC291';
  return d;
}
document.getElementById('myAvatar').appendChild(blankAvatar(40));
document.getElementById('headerAvatar').appendChild(blankAvatar(50));

// hamburger
document.getElementById('menu').onclick = () => document.getElementById('side').classList.toggle('active');

// feed
async function load(){
  if(typeof sb === 'undefined'){
    document.getElementById('feed').innerHTML = '<div class="chat-box"><div class="chat-txt"><p>Error: cek supabase-client.js</p></div></div>';
    return;
  }
  const {data,error} = await sb.from('posts').select('*').order('created_at',{ascending:false}).limit(20);
  if(error){document.getElementById('feed').innerHTML = `<div class="chat-box"><div class="chat-txt"><p>${error.message}</p></div></div>`;return}
  
  document.getElementById('feed').innerHTML = data.map(p=>{
    const isMe = p.user_id === myId;
    return `
    <div class="chat-box ${isMe?'my-message':''}">
      <div style="width:40px;height:40px;border-radius:50%;background:#49426E;flex-shrink:0"></div>
      <div class="chat-txt">
        <h4>${p.user||'Anonim'} <span>${new Date(p.created_at).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}</span></h4>
        <p>${(p.text||'').replace(/</g,'&lt;')}</p>
        ${p.media_url?`<img src="${p.media_url}" style="width:100%;margin-top:8px;border-radius:10px;border:none">`:''}
      </div>
    </div>`
  }).join('') || '<div class="chat-box"><div class="chat-txt"><p>Belum ada postingan</p></div></div>';
}
load();
</script>
</body></html>
