<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lupa Password – Puu Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">Puu <span>Chat</span></div>
    <div class="auth-title">Reset password</div>
    <div class="auth-sub">Masukkan email kamu. Kami akan kirim link untuk atur ulang password.</div>
    <form id="forgotForm">
      <div class="auth-field"><label>Email</label>
        <input class="auth-input" type="email" id="email" placeholder="kamu@email.com" required autocomplete="email">
      </div>
      <button class="btn-auth" id="sendBtn" type="submit">Kirim link reset</button>
    </form>
    <div class="auth-foot">Ingat password? <a href="login.html">Kembali masuk</a></div>
  </div>
  <div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://gttedpjwqgiyszmrcnoe.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0dGVkcGp3cWdpeXN6bXJjbm9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjk3MjIsImV4cCI6MjA5Njk0NTcyMn0.GzouEkyd6pRvT_IQuNR7LTyN6ewPiCTj2Xqu8l9yEcY";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),2400) }

document.getElementById('forgotForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('sendBtn');
  btn.disabled = true; btn.textContent = 'Mengirim…';
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login.html'
  });
  btn.disabled = false; btn.textContent = 'Kirim link reset';
  if(error){ showToast(error.message); return }
  showToast('Link reset terkirim. Cek email kamu');
});
</script>
</body>
</html>
