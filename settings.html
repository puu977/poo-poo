<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Puu Chat – Pengaturan</title>
<link rel="stylesheet" href="assets/css/puu.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="topbar">
  <button class="hamburger icon-btn" id="hamburger">☰</button>
  <div class="logo-wrap"><div class="logo-mark">P</div><div class="logo-text">Puu <span>Chat</span></div></div>
  <div class="topbar-right">
    <a class="top-user" href="profil.html"><img id="topAvatar" src="assets/img/avatar-blank.png" alt=""></a>
  </div>
</header>

<div class="app-body">
<aside class="sidebar" id="sidebar">
  <a class="nav-item" href="index.html">Home</a>
  <a class="nav-item" href="teman.html">Teman</a>
  <a class="nav-item" href="chat.html">Pesan</a>
  <a class="nav-item" href="grup.html">Grup</a>
  <a class="nav-item" href="server.html">Server</a>
  <a class="nav-item active" href="settings.html">Pengaturan</a>
</aside>

<main class="main">
<div class="view-inner">
  <div class="section-title">Pengaturan</div>
  <div class="card" style="padding:20px;max-width:620px">
    <h3>Akun</h3>
    <div class="field" style="margin-top:12px"><label>Email</label><input class="input" placeholder="kamu@email.com"></div>
    <div class="field" style="margin-top:12px"><label>Bahasa</label>
      <select class="select"><option>Indonesia</option><option>English</option></select>
    </div>
    <hr class="soft" style="margin:18px 0">
    <button class="btn" style="background:#a54a5a;color:#ffe7e7;border-color:transparent" onclick="doLogout()">Keluar</button>
  </div>
</div>
</main>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/app.js"></script>
<script>
async function doLogout(){
  if(typeof sb!== 'undefined'){ try{ await sb.auth.signOut() }catch(e){} }
  localStorage.removeItem('puu_avatar')
  showToast('Berhasil keluar')
  setTimeout(()=> location.href='login.html', 700)
}
</script>
</body>
</html>
