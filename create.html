<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Buat Postingan</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
<style>
.create-top{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--b)}
.create-top button{background:none;border:none;color:var(--t);font-size:24px}
.create-user{display:flex;gap:10px;padding:14px;align-items:center}
.create-user img{width:40px;height:40px;border-radius:50%}
.create-user.name{font-weight:600}
.create-user.priv{background:var(--card2);border:1px solid var(--b);padding:4px 10px;border-radius:6px;font-size:12px;margin-top:2px;display:inline-flex;align-items:center;gap:4px}
.textarea-wrap{padding:0 16px;min-height:200px;display:flex;align-items:center}
#statusText{width:100%;background:none;border:none;outline:none;color:var(--t);font-size:22px;font-family:Poppins;resize:none;min-height:120px}
#statusText::placeholder{color:var(--d)}
.bg-picker{display:flex;gap:8px;padding:12px 16px;overflow-x:auto}
.bg-opt{width:36px;height:36px;border-radius:8px;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.bg-opt.active{border-color:#fff}
.preview-media{padding:0 16px;margin-top:10px;position:relative}
.preview-media img,.preview-media video{width:100%;max-height:300px;object-fit:cover;border-radius:12px}
.preview-media.x{position:absolute;top:8px;right:24px;width:28px;height:28px;background:#000c;color:#fff;border:none;border-radius:50%;font-size:18px}
.options{margin-top:auto;border-top:1px solid var(--b)}
.opt-item{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--b);cursor:pointer}
.opt-item:last-child{border:none}
.opt-left{display:flex;align-items:center;gap:12px}
.opt-icon{font-size:22px;width:28px;text-align:center}
.post-bar{padding:12px 16px;display:flex;justify-content:flex-end}
.post-bar button{background:var(--a);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-weight:600;font-size:15px;opacity:.5}
.post-bar button.active{opacity:1}
</style>
</head>
<body>
<div class="create-top">
  <button onclick="history.back()">✕</button>
  <div style="flex:1;text-align:center;font-weight:600">Buat postingan</div>
  <div style="width:24px"></div>
</div>

<div class="create-user">
  <img id="cu" src="assets/img/avatar-blank.png">
  <div>
    <div class="name" id="cn">User</div>
    <div class="priv">🌐 Publik ▼</div>
  </div>
</div>

<div class="textarea-wrap" id="tw">
  <textarea id="statusText" placeholder="Apa yang Anda pikirkan?" oninput="check()"></textarea>
</div>

<div class="bg-picker" id="bgp">
  <div class="bg-opt active" style="background:#2a1b40" data-bg="#2a1b40" onclick="setBg(this)"></div>
  <div class="bg-opt" style="background:linear-gradient(45deg,#ff6b6b,#ee5a24)" data-bg="linear-gradient(45deg,#ff6b6b,#ee5a24)" onclick="setBg(this)"></div>
  <div class="bg-opt" style="background:linear-gradient(45deg,#4834d4,#686de0)" data-bg="linear-gradient(45deg,#4834d4,#686de0)" onclick="setBg(this)"></div>
  <div class="bg-opt" style="background:linear-gradient(45deg,#00d2d3,#54a0ff)" data-bg="linear-gradient(45deg,#00d2d3,#54a0ff)" onclick="setBg(this)"></div>
  <div class="bg-opt" style="background:linear-gradient(45deg,#5f27cd,#341f97)" data-bg="linear-gradient(45deg,#5f27cd,#341f97)" onclick="setBg(this)"></div>
  <div class="bg-opt" style="background:linear-gradient(45deg,#ff9f43,#feca57)" data-bg="linear-gradient(45deg,#ff9f43,#feca57)" onclick="setBg(this)"></div>
</div>

<div class="preview-media" id="pvm" style="display:none"></div>

<div class="options">
  <div class="opt-item" onclick="pf.click()">
    <div class="opt-left"><div class="opt-icon">📷</div><span>Foto/video</span></div>
    <div>›</div>
  </div>
  <div class="opt-item" onclick="toast('Tag teman')">
    <div class="opt-left"><div class="opt-icon">👤</div><span>Tandai orang</span></div>
    <div>›</div>
  </div>
  <div class="opt-item" onclick="toast('Perasaan')">
    <div class="opt-left"><div class="opt-icon">😊</div><span>Perasaan/aktivitas</span></div>
    <div>›</div>
  </div>
  <div class="opt-item" onclick="toast('Lokasi')">
    <div class="opt-left"><div class="opt-icon">📍</div><span>Check in</span></div>
    <div>›</div>
  </div>
</div>

<div class="post-bar">
  <button id="pb" onclick="posting()">KIRIM</button>
</div>

<input type="file" id="pf" hidden accept="image/*,video/*">

<script>
const me = localStorage.pn || localStorage.pid || 'User'
const av = localStorage.pa || 'assets/img/avatar-blank.png'
document.getElementById('cu').src = av
document.getElementById('cn').textContent = me

let media=null, mediatype=null, bg='#2a1b40'

function setBg(el){
  document.querySelectorAll('.bg-opt').forEach(b=>b.classList.remove('active'))
  el.classList.add('active')
  bg = el.dataset.bg
  document.getElementById('tw').style.background = bg
  document.getElementById('tw').style.borderRadius = '12px'
  document.getElementById('tw').style.margin = '0 16px'
  check()
}

function check(){
  const t = statusText.value.trim()
  const btn = document.getElementById('pb')
  if(t || media){ btn.classList.add('active') } else { btn.classList.remove('active') }
}

pf.onchange = e => {
  const f = e.target.files[0]; if(!f) return
  media = URL.createObjectURL(f)
  mediatype = f.type.startsWith('video')? 'v' : 'i'
  pvm.style.display = 'block'
  pvm.innerHTML = `${mediatype==='v'?`<video src="${media}" controls></video>`:`<img src="${media}">`}<button class="x" onclick="clearM()">×</button>`
  check()
}
function clearM(){ media=null; pvm.style.display='none'; pvm.innerHTML=''; check() }

function posting(){
  const t = statusText.value.trim()
  if(!t &&!media) return
  let ps = JSON.parse(localStorage.ps || '[]')
  ps.unshift({n:me,a:av,t:Date.now(),x:t,m:media,mt:mediatype,l:0,c:[],s:0,bg:bg})
  localStorage.ps = JSON.stringify(ps)
  location.href = 'index.html'
}

function toast(m){ alert(m) }

statusText.focus()
</script>
</body>
</html>
