<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Puu Chat – Pesan</title>
<link rel="stylesheet" href="assets/css/puu.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="topbar">
  <button class="hamburger icon-btn" id="hamburger">☰</button>
  <div class="logo-wrap"><div class="logo-mark">P</div><div class="logo-text">Puu <span>Chat</span></div></div>
  <div class="global-search"><input placeholder="Cari pesan…"></div>
  <div class="topbar-right">
    <a class="icon-btn" href="settings.html">⚙️</a>
    <a class="top-user" href="profil.html"><img id="topAvatar" src="assets/img/avatar-blank.png" alt=""></a>
  </div>
</header>

<div class="app-body">
<aside class="sidebar" id="sidebar">
  <a class="nav-item" href="index.html">Home</a>
  <a class="nav-item" href="teman.html">Teman</a>
  <a class="nav-item active" href="chat.html">Pesan</a>
  <a class="nav-item" href="grup.html">Grup</a>
  <a class="nav-item" href="server.html">Server</a>
  <a class="nav-item" href="settings.html">Pengaturan</a>
</aside>

<main class="main" style="padding:0">
<div class="chat-layout">
  <div class="chat-left">
    <div class="chat-left-top">
      <div class="chat-search"><input id="contactSearch" placeholder="Cari kontak…"></div>
    </div>
    <div class="contact-list" id="contactList"></div>
  </div>
  <div class="chat-right">
    <div class="chat-header">
      <img id="dmAvatar" src="assets/img/avatar-blank.png" alt="">
      <div class="chat-header-info">
        <div class="chat-header-name" id="dmName">Pilih obrolan</div>
        <div class="chat-header-status">-</div>
      </div>
    </div>
    <div class="chat-messages" id="dmMessages" style="display:flex;align-items:center;justify-content:center;color:#b99ecf">
      Pilih kontak di kiri untuk mulai chat
    </div>
    <div class="chat-composer">
      <div class="composer-inner">
        <input class="composer-input" placeholder="Pilih obrolan dulu…" disabled>
        <button class="send-btn" disabled>Kirim</button>
      </div>
    </div>
  </div>
</div>
</main>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
