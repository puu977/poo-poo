<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Edit Profil</title>
<link rel="stylesheet" href="assets/css/main.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<style>
body{padding:0!important;background:#332F54!important;color:#E2D3F4}
.wrap{max-width:500px;margin:0 auto;padding:20px}
h2{color:#EEC291}
label{display:block;margin:16px 0 6px;opacity:.8}
input,textarea{width:100%;background:#49426E;border:2px solid #544F7E;color:#fff;padding:12px;border-radius:10px}
.preview{width:100%;height:140px;background:#49426E;border-radius:12px;margin:8px 0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.preview img{width:100%;height:100%;object-fit:cover}
.btn{background:#EEC291;color:#332F54;padding:12px;border:none;border-radius:12px;width:100%;font-weight:600;margin-top:20px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <h2>Edit Profil</h2>

  <label>Banner</label>
  <div class="preview" onclick="bannerIn.click()"><img id="bPrev" src="assets/banner-default.jpg"></div>
  <input type="file" id="bannerIn" accept="image/*" hidden>

  <label>Avatar</label>
  <div class="preview" style="width:120px;height:120px;border-radius:50%;margin:auto" onclick="avatarIn.click()"><img id="aPrev" src="assets/avatar.png"></div>
  <input type="file" id="avatarIn" accept="image/*" hidden>

  <label>Username</label>
  <input id="username" placeholder="Anonim">

  <label>Bio</label>
  <textarea id="bio" rows="3" placeholder="Ceritain diri lu..."></textarea>

  <button class="btn" onclick="save()">Simpan</button>
</div>

<script>
const bPrev = document.getElementById('bPrev'), aPrev = document.getElementById('aPrev');
bannerIn.onchange = e=> bPrev.src = URL.createObjectURL(e.target.files[0]);
avatarIn.onchange = e=> aPrev.src = URL.createObjectURL(e.target.files[0]);

async function save(){
  let bannerUrl, avatarUrl;
  if(bannerIn.files[0]){
    const n='banner-'+Date.now(); await supa.storage.from('profiles').upload(n,bannerIn.files[0]); bannerUrl = supa.storage.from('profiles').getPublicUrl(n).data.publicUrl;
  }
  if(avatarIn.files[0]){
    const n='avatar-'+Date.now(); await supa.storage.from('profiles').upload(n,avatarIn.files[0]); avatarUrl = supa.storage.from('profiles').getPublicUrl(n).data.publicUrl;
  }
  await supa.from('profiles').upsert({id:'anon',username:username.value,bio:bio.value,avatar_url:avatarUrl,banner_url:bannerUrl});
  location='profil.html';
}
</script>
</body>
</html>
